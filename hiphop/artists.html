<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Все артисты — ROOTS BOOK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400..900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="styles.css">
<style>
.sort-row{display:flex;align-items:center;gap:8px}
.sort-btn{
  border:1px solid var(--line);border-radius:999px;background:#fff;
  padding:9px 15px;font-size:12.5px;font-weight:700;cursor:pointer;color:var(--muted);
}
.sort-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}
</style>
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a class="logo" href="index.html">ROOTS BOOK</a>
    <nav class="nav">
      <a href="index.html">Главная</a>
      <a href="editor.html">Контакты</a>
    </nav>
  </div>
</header>
<script src="header-scroll.js"></script>

<section class="section">
  <div class="wrap">
    <div class="section-head">
      <h2>Все артисты</h2>
      <span class="count" id="count"></span>
    </div>

    <div class="section-head" style="margin-top:-10px">
      <div class="inline-search">
        <span>⌕</span>
        <input id="q" placeholder="Поиск артиста" oninput="render()">
      </div>
      <div class="sort-row">
        <button class="sort-btn active" id="sort-default" onclick="setSort('default')">По умолчанию</button>
        <button class="sort-btn" id="sort-az" onclick="setSort('az')">А → Я</button>
      </div>
    </div>

    <div class="grid" id="grid"></div>
  </div>
</section>

<footer class="site-footer">
  <div class="wrap">
    <div class="fl">
      ROOTS BOOK © 2026<br>
      Материалы публикуются с разрешения редакции; при цитировании ссылка на источник обязательна.
    </div>
    <div class="fr"><a href="editor.html">Для редакторов</a></div>
  </div>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
const VBADGE = '<span class="vbadge" title="Верифицированный артист"><svg viewBox="0 0 24 24"><path d="M5 12.5l4.5 4.5L19 7.5"/></svg></span>';
const HUES = ['#2B2B2B','#3A3A3A','#242424','#333333','#1c1c1c'];

let sortMode = 'default';
function setSort(mode){
  sortMode = mode;
  document.getElementById('sort-default').classList.toggle('active', mode==='default');
  document.getElementById('sort-az').classList.toggle('active', mode==='az');
  render();
}

function render(){
  const f = document.getElementById('q').value.trim().toLowerCase();
  let list = ARTISTS.filter(a =>
    !f || a.name.toLowerCase().includes(f) || (a.tags||[]).join(' ').includes(f) || a.role.toLowerCase().includes(f));

  if (sortMode === 'az') list = list.slice().sort((a,b) => a.name.localeCompare(b.name, 'ru'));

  document.getElementById('count').textContent = list.length + ' / ' + ARTISTS.length;
  document.getElementById('grid').innerHTML = list.map((a,i) => `
    <a class="card" href="artist.html?id=${a.id}">
      <div class="ph-wrap">
        ${a.photo
          ? `<img src="${a.photo}" alt="${a.name}" style="object-position:${a.photoPos||'center'}" loading="lazy">`
          : `<div class="ph-fallback" style="background:${HUES[i%HUES.length]}">${initials(a.name)}</div>`}
      </div>
      <div class="meta">
        <div class="nm">${a.name}${a.verified ? VBADGE : ''}</div>
      </div>
    </a>`).join('');
}
document.getElementById('q').value = new URLSearchParams(location.search).get('q') || '';
render();
</script>
</body>
</html>
