<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Артист — ROOTS BOOK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="styles.css">
<style>
.artist-hero{border-bottom:2px solid var(--line);padding:44px 0 36px}
.artist-top{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap}
.artist-photo{
  width:160px;height:200px;flex-shrink:0;border:2px solid var(--line);
  box-shadow:5px 5px 0 var(--line);overflow:hidden;background:var(--paper-2);
}
.artist-photo img{width:100%;height:100%;object-fit:cover}
.artist-photo .fb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-family:'Unbounded',sans-serif;font-weight:900;font-size:48px;color:#fff}
.artist-info h1{font-family:'Unbounded',sans-serif;font-weight:900;font-size:clamp(28px,5vw,44px);line-height:1.02}
.artist-info .handle{font-size:14px;color:var(--muted);font-weight:700;margin-top:8px}
.artist-info .bio{font-size:15px;line-height:1.6;margin-top:14px;max-width:60ch;color:#2A261F}
.artist-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.two-col{display:grid;grid-template-columns:1.6fr 1fr;gap:40px;align-items:start}
@media (max-width:820px){.two-col{grid-template-columns:1fr}}
.releases{display:flex;gap:16px;overflow-x:auto;padding-bottom:6px}
.rel-card{flex:0 0 140px;text-decoration:none;color:var(--ink)}
.rel-card .cov{width:140px;height:140px;border:2px solid var(--line);object-fit:cover;background:var(--paper-2)}
.rel-card .t{font-size:12.5px;font-weight:800;margin-top:8px}
.rel-card .y{font-size:11px;color:var(--muted)}
.editors-note{border:2px solid var(--line);background:#fff;padding:14px 16px;margin-top:22px;font-size:12.5px;color:var(--muted)}
.editors-note b{color:var(--ink);display:block;margin-bottom:4px;font-size:11px;letter-spacing:.1em;text-transform:uppercase}
</style>
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a class="logo" href="index.html">ROOTS<span>·</span>BOOK</a>
    <nav class="nav">
      <a href="index.html">Артисты</a>
    </nav>
    <a href="index.html" class="btn ghost" style="padding:9px 16px;box-shadow:none;border-width:2px">← Назад</a>
  </div>
</header>

<section class="artist-hero">
  <div class="wrap">
    <div class="artist-top">
      <div class="artist-photo" id="a-photo"></div>
      <div class="artist-info">
        <h1 id="a-name"></h1>
        <div class="handle" id="a-handle"></div>
        <p class="bio" id="a-bio"></p>
        <div class="tags" id="a-tags"></div>
        <div class="artist-actions">
          <div class="like-btn" id="like-btn" onclick="handleLike()">
            <svg viewBox="0 0 24 24"><path d="M12 20s-7-4.35-9.5-8.5C.7 8.2 2 4.5 5.5 4c2-.28 3.6.7 4.5 2 .9-1.3 2.5-2.28 4.5-2 3.5.5 4.8 4.2 3 7.5C19 15.65 12 20 12 20z"/></svg>
            <span class="like-count">0</span>
          </div>
          <button class="btn ghost" id="edit-btn" style="display:none" onclick="handleEdit()">✎ Редактировать статью</button>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="section">
  <div class="wrap two-col">
    <div>
      <div class="section-head"><h2>Rap Score</h2></div>
      <div class="skills" id="a-skills"></div>

      <div id="a-article-wrap" style="display:none">
        <div class="section-head" style="margin-top:40px"><h2>История</h2></div>
        <div class="article" id="a-article"></div>
        <div class="editors-note">
          <b>Редакция</b>
          Павел Ивушкин · Илья Капустин · Роман Рув · Никита Завадский
        </div>
      </div>

      <div class="section-head" style="margin-top:40px"><h2>Комментарии</h2></div>
      <div class="comment-form">
        <input id="comment-input" placeholder="Ваш комментарий…" maxlength="500">
        <button class="comment-send" onclick="handleComment()">→</button>
      </div>
      <div id="comments-list"></div>
    </div>

    <div>
      <div id="a-rels-wrap" style="display:none">
        <div class="section-head"><h2>Релизы</h2></div>
        <div class="releases" id="a-rels"></div>
      </div>
      <div id="a-links-wrap" style="display:none;margin-top:32px">
        <div class="section-head"><h2>Ссылки</h2></div>
        <div class="tags" id="a-links"></div>
      </div>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="wrap">
    <div class="fl">ROOTS BOOK © 2026<br>Материалы публикуются с разрешения редакции; при цитировании ссылка на источник обязательна.</div>
    <div class="fr"><a href="editor.html">Для редакторов</a></div>
  </div>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
const VBADGE = '<span class="vbadge" title="Верифицированный артист"><svg viewBox="0 0 24 24"><path d="M5 12.5l4.5 4.5L19 7.5"/></svg></span>';
const id = new URLSearchParams(location.search).get('id');
const artist = ARTISTS.find(a => a.id === id);
let dbArticle = null;

if (!artist){
  document.querySelector('.artist-hero .wrap').innerHTML = `<p>Артист не найден. <a href="index.html">Вернуться на главную</a>.</p>`;
} else {
  document.title = artist.name + ' — ROOTS BOOK';
  render();
}

function render(){
  const photoEl = document.getElementById('a-photo');
  photoEl.innerHTML = artist.photo
    ? `<img src="${artist.photo}" style="object-position:${artist.photoPos||'center'}">`
    : `<div class="fb" style="background:${artist.hue}">${initials(artist.name)}</div>`;

  document.getElementById('a-name').innerHTML = artist.name + (artist.verified ? VBADGE : '');
  document.getElementById('a-handle').textContent = artist.handle + ' · ' + artist.role;
  document.getElementById('a-bio').textContent = artist.bio;
  document.getElementById('a-tags').innerHTML = (artist.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');

  const sk = artist.skills || {flow:9,style:9,penmanship:9,musicality:9,legacy:9};
  const items = [['FLOW',sk.flow],['STYLE',sk.style],['PENMANSHIP',sk.penmanship],['MUSICALITY',sk.musicality],['LEGACY',sk.legacy]];
  document.getElementById('a-skills').innerHTML = items.map(([l,v])=>`
    <div class="sk">
      <span class="skl">${l}</span>
      <div class="skbar"><i data-w="${(v*10).toFixed(0)}"></i></div>
      <span class="skv">${v.toFixed(1)}</span>
    </div>`).join('');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.querySelectorAll('.skbar i').forEach(el => el.style.width = el.dataset.w + '%');
  }));

  const artWrap = document.getElementById('a-article-wrap');
  if (artist.article){
    artWrap.style.display = 'block';
    document.getElementById('a-article').innerHTML = artist.article;
  }

  const linksWrap = document.getElementById('a-links-wrap');
  if (artist.links && artist.links.length){
    linksWrap.style.display = 'block';
    document.getElementById('a-links').innerHTML = artist.links.map(l =>
      `<a class="tag" href="${l.u}" target="_blank" rel="noopener">${l.t}</a>`).join('');
  }

  const relsWrap = document.getElementById('a-rels-wrap');
  if (artist.rels && artist.rels.length){
    relsWrap.style.display = 'block';
    document.getElementById('a-rels').innerHTML = artist.rels.map(r => `
      <a class="rel-card" href="${r.link || '#'}" ${r.link ? 'target="_blank" rel="noopener"' : ''}>
        ${r.cov ? `<img class="cov" src="${r.cov}">` : `<div class="cov" style="display:flex;align-items:center;justify-content:center;font-family:'Unbounded';font-weight:900;font-size:28px;color:#fff">♪</div>`}
        <div class="t">${r.t}</div><div class="y">${r.y}</div>
      </a>`).join('');
  }

  const editBtn = document.getElementById('edit-btn');
  editBtn.style.display = EditorAuth.isLoggedIn() ? 'inline-flex' : 'none';

  refreshLike();
  refreshComments();
  loadDbArticle();
}

async function loadDbArticle(){
  dbArticle = await fetchPublishedArticle(artist.id, 'ru');
  if (dbArticle){
    document.getElementById('a-article-wrap').style.display = 'block';
    document.getElementById('a-article').innerHTML = renderBlocks(dbArticle.blocks);
  }
}

async function refreshLike(){
  const { count, liked } = await getLikeState(artist.id);
  document.querySelector('#like-btn .like-count').textContent = count;
  document.getElementById('like-btn').classList.toggle('liked', liked);
}
async function handleLike(){
  await toggleLike(artist.id);
  refreshLike();
}

async function refreshComments(){
  const list = await fetchComments(artist.id);
  const el = document.getElementById('comments-list');
  el.innerHTML = list.length ? list.map(c => `
    <div class="comment">
      <div class="av">${escapeHtml((c.author||'?')[0].toUpperCase())}</div>
      <div><p>${escapeHtml(c.text)}</p><div class="cn">${escapeHtml(c.author)}</div></div>
    </div>`).join('') : '<p class="empty-state">Пока нет комментариев — будьте первым.</p>';
}
async function handleComment(){
  const input = document.getElementById('comment-input');
  const text = input.value.trim();
  if (!text) return;
  await postComment(artist.id, EditorAuth.editor?.name || 'Гость', text);
  input.value = '';
  refreshComments();
}

function handleEdit(){
  openArticleEditor(artist.id, artist.name, dbArticle);
}
window.addEventListener('rb:article-saved', (e) => {
  if (e.detail.artistId === artist.id) loadDbArticle();
});
</script>
</body>
</html>
