<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кабинет редактора — ROOTS BOOK</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400..900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="styles.css">
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-82LNQ84BMJ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-82LNQ84BMJ');
</script>

</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a class="logo" href="index.html">ROOTS BOOK</a>
    <div class="inline-search">
      <span>⌕</span>
      <input placeholder="Поиск артиста"
        onkeydown="if(event.key==='Enter') location.href='artists.html?q='+encodeURIComponent(this.value)">
    </div>
  </div>
</header>
<script src="header-scroll.js"></script>

<section class="section">
  <div class="wrap" style="max-width:640px">
    <div id="login-zone"></div>

    <div id="manage-zone" style="display:none">
      <div class="section-head"><h2>Баннеры (макс. 5)</h2></div>
      <div id="banner-list"></div>
      <button class="btn ghost" id="add-banner-btn" onclick="openBannerEditor()" style="margin-bottom:12px">+ Добавить баннер</button>

      <div class="section-head" style="margin-top:32px"><h2>Настройки сайта</h2></div>
      <div class="artist-manage-row">
        <div>
          <div class="nm">Контакты</div>
          <div class="status">email редакции и рекламы</div>
        </div>
        <button class="btn ghost" style="box-shadow:none;padding:9px 16px" onclick="openContactsEditor()">✎ Изменить</button>
      </div>
      <div class="artist-manage-row">
        <div>
          <div class="nm">Донат</div>
          <div class="status">карта / крипто-кошелёк</div>
        </div>
        <button class="btn ghost" style="box-shadow:none;padding:9px 16px" onclick="openDonateEditor()">✎ Изменить</button>
      </div>

      <div class="section-head" style="margin-top:32px"><h2>Артисты</h2></div>
      <div id="artist-list"></div>
    </div>
  </div>
</section>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
function render(){
  const loginZone = document.getElementById('login-zone');
  const manageZone = document.getElementById('manage-zone');

  if (!EditorAuth.isLoggedIn()){
    manageZone.style.display = 'none';
    loginZone.innerHTML = `
      <div class="login-card">
        <div class="login-title">Вход для редакторов</div>
        <div class="login-sub">Доступ выдаётся вручную через Supabase. Если у тебя нет аккаунта — обратись к администратору.</div>
        <div class="login-field">
          <label>Email</label>
          <input id="login-email" type="email" placeholder="you@example.com" autocomplete="username">
        </div>
        <div class="login-field">
          <label>Пароль</label>
          <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="login-submit" id="login-btn" onclick="handleLogin()">Войти</button>
        <div class="login-error" id="login-error"></div>
      </div>`;
    return;
  }

  loginZone.innerHTML = `
    <div class="editor-badge">
      <div>
        <div class="nm" style="font-weight:800">${EditorAuth.editor.name}</div>
        <div style="font-size:11.5px;color:var(--muted)">${EditorAuth.editor.role}</div>
      </div>
      <button class="logout-btn" onclick="handleLogout()">Выйти</button>
    </div>`;
  manageZone.style.display = 'block';
  renderArtistList();
  renderBannerList();
}

async function handleLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  err.textContent = '';
  if (!email || !pass){ err.textContent = 'Заполни оба поля'; return; }
  btn.disabled = true; btn.textContent = 'Входим…';
  try{
    await EditorAuth.login(email, pass);
    render();
  }catch(e){
    err.textContent = e.message || 'Ошибка входа';
    btn.disabled = false; btn.textContent = 'Войти';
  }
}
function handleLogout(){ EditorAuth.logout().then(render); }

async function renderBannerList(){
  const wrap = document.getElementById('banner-list');
  const banners = await fetchBanners();
  document.getElementById('add-banner-btn').style.display = banners.length >= 5 ? 'none' : 'inline-flex';

  wrap.innerHTML = banners.length ? banners.map(b => `
    <div class="banner-row">
      <img src="${b.image_url}">
      <div style="flex:1;min-width:0">
        <div class="link">${b.link_url || 'без ссылки'}</div>
      </div>
      <button class="btn ghost" style="box-shadow:none;padding:7px 14px" onclick='openBannerEditor(${JSON.stringify(b)})'>✎</button>
      <button class="btn ghost" style="box-shadow:none;padding:7px 14px" onclick="handleDeleteBanner('${b.id}')">✕</button>
    </div>`).join('') : '<p class="empty-state">Баннеров пока нет.</p>';
}

async function handleDeleteBanner(id){
  if (!confirm('Удалить баннер?')) return;
  await deleteBanner(id);
  renderBannerList();
}

function openBannerEditor(existing){
  if (!EditorAuth.isLoggedIn()){ alert('Сначала войдите как редактор.'); return; }
  const modal = document.createElement('div');
  modal.className = 'editor-modal';
  modal.innerHTML = `
    <div class="editor-panel" style="max-width:420px">
      <div class="editor-panel-head">
        <h3>${existing ? 'Изменить баннер' : 'Новый баннер'}</h3>
        <div class="editor-close" onclick="this.closest('.editor-modal').remove()">✕</div>
      </div>
      <div class="ed-block">
        <b>Картинка — десктоп</b>
        <input id="bn-image" placeholder="https://... (ссылка на картинку)" value="${existing?.image_url || ''}">
        <input id="bn-file" type="file" accept="image/*" style="padding:8px 0">
        <div id="bn-status" style="font-size:11.5px;color:var(--muted)"></div>
      </div>
      <div class="ed-block">
        <b>Картинка — мобильная (необязательно, иначе возьмётся десктопная)</b>
        <input id="bn-image-mobile" placeholder="https://... (ссылка на картинку)" value="${existing?.image_url_mobile || ''}">
        <input id="bn-file-mobile" type="file" accept="image/*" style="padding:8px 0">
        <div id="bn-status-mobile" style="font-size:11.5px;color:var(--muted)"></div>
      </div>
      <div class="ed-block">
        <b>Ссылка при клике (необязательно)</b>
        <input id="bn-link" placeholder="https://..." value="${existing?.link_url || ''}">
      </div>
      <div class="ed-block">
        <b>Заголовок на баннере (необязательно, например "NEW ALBUM")</b>
        <input id="bn-heading" placeholder="Заголовок" value="${existing?.heading_text || ''}">
      </div>
      <div class="ed-block">
        <b>Текст кнопки на баннере (необязательно)</b>
        <input id="bn-button-text" placeholder="Например: Купить билет" value="${existing?.button_text || ''}">
      </div>
      <div class="editor-actions" style="justify-content:flex-end">
        <div class="ed-btn-row">
          <button id="bn-cancel">Отмена</button>
          <button id="bn-save">Сохранить</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(modal);

  modal.querySelector('#bn-file').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const status = modal.querySelector('#bn-status');
    status.textContent = 'Загружаем…';
    try{
      const url = await uploadPhoto(file);
      modal.querySelector('#bn-image').value = url;
      status.textContent = 'Загружено ✓';
    }catch(err){ status.textContent = 'Ошибка: ' + err.message; }
  });

  modal.querySelector('#bn-file-mobile').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const status = modal.querySelector('#bn-status-mobile');
    status.textContent = 'Загружаем…';
    try{
      const url = await uploadPhoto(file);
      modal.querySelector('#bn-image-mobile').value = url;
      status.textContent = 'Загружено ✓';
    }catch(err){ status.textContent = 'Ошибка: ' + err.message; }
  });

  modal.querySelector('#bn-cancel').onclick = () => modal.remove();
  modal.querySelector('#bn-save').onclick = async () => {
    const image_url = modal.querySelector('#bn-image').value.trim();
    const image_url_mobile = modal.querySelector('#bn-image-mobile').value.trim();
    const link_url = modal.querySelector('#bn-link').value.trim();
    const heading_text = modal.querySelector('#bn-heading').value.trim();
    const button_text = modal.querySelector('#bn-button-text').value.trim();
    if (!image_url){ alert('Нужна картинка'); return; }
    const btn = modal.querySelector('#bn-save');
    btn.disabled = true; btn.textContent = 'Сохраняем…';
    try{
      await saveBanner({ id: existing?.id, image_url, image_url_mobile, link_url, heading_text, button_text });
      modal.remove();
      renderBannerList();
    }catch(e){
      alert('Не получилось сохранить: ' + e.message);
      btn.disabled = false; btn.textContent = 'Сохранить';
    }
  };
}

async function renderArtistList(){
  const wrap = document.getElementById('artist-list');
  wrap.innerHTML = ARTISTS.map(a => `
    <div class="artist-manage-row">
      <div>
        <div class="nm">${a.name}</div>
        <div class="status" id="status-${a.id}">проверяем статьи…</div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0">
        <button class="btn ghost" style="box-shadow:none;padding:9px 16px" onclick="editArtist('${a.id}')">✎ Статья</button>
        <button class="btn ghost" style="box-shadow:none;padding:9px 16px" onclick="editArtistProfileFromList('${a.id}')">✎ Имя/фото</button>
      </div>
    </div>`).join('');

  for (const a of ARTISTS){
    const list = await fetchArtistArticles(a.id);
    const el = document.getElementById('status-' + a.id);
    if (!list.length) el.textContent = 'статей в базе ещё нет — используется старый текст';
    else {
      const pub = list.filter(x=>x.published).length;
      el.textContent = `${list.length} версии · ${pub} опубликовано`;
    }
  }
}

async function editArtist(id){
  const a = ARTISTS.find(x => x.id === id);
  const list = await fetchArtistArticles(id);
  const existing = list.find(x => x.lang === 'ru') || list[0] || null;
  openArticleEditor(id, a.name, existing);
}

async function editArtistProfileFromList(id){
  const a = ARTISTS.find(x => x.id === id);
  const override = await fetchArtistOverride(id);
  openArtistProfileEditor(id, override?.name || a.name, override?.photo_url || a.photo || '', override?.infobox || {});
}
window.addEventListener('rb:article-saved', renderArtistList);
window.addEventListener('rb:artist-saved', renderArtistList);

editorAuthReady.then(render);
</script>
</body>
</html>
