<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TYRAZH</title>
<meta name="description" content="TYRAZH — label">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<style>
  @font-face {
    font-family: 'Gigantic';
    src: url('fonts/Gigantic.otf') format('opentype');
    font-weight: 400; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Mutabor';
    src: url('fonts/Mutabor.otf') format('opentype');
    font-weight: 400; font-style: normal; font-display: swap;
  }

  :root {
    --blue: #1d2bbf;
    --red: #f0331c;
    --ink: #ffffff;
    --ease: cubic-bezier(0.65, 0, 0.18, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #060606;
  }

  /* видео-фон на весь экран */
  .bgvideo {
    position: fixed;
    inset: -40px;
    width: calc(100% + 80px);
    height: calc(100% + 80px);
    object-fit: cover;
    z-index: 0;
    filter: blur(0px) brightness(1);
    transition: filter 0.9s ease;
  }

  body[data-view="releases"] .bgvideo {
    filter: blur(28px) brightness(0.55);
  }

  body {
    font-family: 'Mutabor', sans-serif;
    color: var(--ink);
  }

  /* ---------- навигация ---------- */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 15;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: clamp(22px, 4.5vh, 48px) clamp(24px, 4vw, 64px) 0;
  }

  .brand {
    font-family: 'Gigantic', sans-serif;
    font-size: clamp(1.3rem, 2.6vw, 2rem);
    letter-spacing: 0.02em;
    color: var(--ink);
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
  }

  body[data-view="releases"] .brand {
    opacity: 1;
    pointer-events: auto;
  }

  .nav { display: flex; gap: clamp(20px, 3.5vw, 48px); }

  .nav button {
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Mutabor', sans-serif;
    font-size: clamp(1rem, 1.8vw, 1.4rem);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink);
    padding: 0 0 4px;
    border-bottom: 1px solid transparent;
    transition: opacity 0.3s ease, border-color 0.3s ease;
  }

  .nav button:hover { opacity: 0.6; }
  .nav button:focus-visible { outline: 1px solid var(--ink); outline-offset: 4px; }
  .nav button.active { border-bottom-color: rgba(255,255,255,0.6); }

  /* ---------- лента секций ---------- */
  .track {
    position: fixed;
    inset: 0;
    z-index: 5;
    display: flex;
    width: 200vw;
    transform: translateX(0);
    transition: transform 1s var(--ease);
    will-change: transform;
  }

  body[data-view="releases"] .track { transform: translateX(-100vw); }

  .view {
    position: relative;
    width: 100vw;
    height: 100%;
    flex-shrink: 0;
  }

  /* ---------- HOME ---------- */
  .logo {
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    transform: translateY(-50%);
    text-align: center;
    font-family: 'Gigantic', sans-serif;
    font-size: clamp(4rem, 21vw, 20rem);
    line-height: 0.9;
    letter-spacing: 0.01em;
    color: var(--red);
    user-select: none;
    pointer-events: none;
    white-space: nowrap;
  }

  .footer {
    position: absolute;
    right: clamp(24px, 4vw, 64px);
    bottom: clamp(20px, 4vh, 40px);
    text-align: right;
    font-size: clamp(0.6rem, 1vw, 0.78rem);
    letter-spacing: 0.06em;
    line-height: 1.6;
    text-transform: uppercase;
    opacity: 0.85;
  }

  /* ---------- RELEASES ---------- */
  .view-inner {
    height: 100%;
    overflow-y: auto;
    padding: calc(clamp(22px, 4.5vh, 48px) + clamp(50px, 9vh, 90px)) clamp(24px, 4vw, 64px) clamp(60px, 10vh, 120px);
  }

  .page-title {
    font-family: 'Gigantic', sans-serif;
    font-size: clamp(2.4rem, 7vw, 5.5rem);
    letter-spacing: 0.01em;
    color: var(--ink);
    margin: 0 auto clamp(32px, 6vh, 64px);
    max-width: 1280px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(260px, 100%), 1fr));
    gap: clamp(20px, 3vw, 36px);
    max-width: 1280px;
    margin: 0 auto;
  }

  .release {
    display: block;
    text-decoration: none;
    color: var(--ink);
  }

  .cover {
    position: relative;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
  }

  .cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s ease;
  }

  a.release:hover .cover img,
  a.release:focus-visible .cover img {
    transform: scale(1.05);
    filter: brightness(1.08);
  }

  a.release:focus-visible { outline: 1px solid var(--ink); outline-offset: 4px; }

  @media (prefers-reduced-motion: reduce) {
    .track { transition: none; }
    .cover img { transition: none; }
  }
</style>
</head>
<body data-view="home">
  <video class="bgvideo" autoplay muted loop playsinline poster="bg-poster.jpg">
    <source src="bg.mp4" type="video/mp4">
  </video>
  <header>
    <button class="brand" data-go="home">TYRAZH</button>
    <nav class="nav">
      <button data-go="home" class="active">home</button>
      <button data-go="releases">releases</button>
    </nav>
  </header>

  <div class="track">

    <!-- HOME -->
    <section class="view" id="view-home">
      <h1 class="logo">TYRAZH</h1>
      <div class="footer">
        &copy; 2026 TYRAZH / All rights reserved.<br>
        Artwork, music and visuals are property of their respective owners.<br>
        Made in Ukraine
      </div>
    </section>

    <!-- RELEASES -->
    <section class="view" id="view-releases">
      <div class="view-inner">
        <div class="grid">

          <a class="release" href="/kupidony">
            <div class="cover">
              <img src="covers/kupidony.jpg" alt="Polya Topolya — Купідони" loading="lazy">
            </div>
          </a>

          <a class="release" href="/radar">
            <div class="cover">
              <img src="covers/radar.jpg" alt="Sимптом — RADAR" loading="lazy">
            </div>
          </a>

          <a class="release" href="/grebz/#mc-coming">
            <div class="cover">
              <img src="covers/mc-coming.jpg" alt="Grebz — MC COMING" loading="lazy">
            </div>
          </a>

          <a class="release" href="/grebz/#style-in-mc">
            <div class="cover">
              <img src="covers/style-in-mc.jpg" alt="Grebz — STYLE IN MC" loading="lazy">
            </div>
          </a>

          <a class="release" href="/grebz/#rapper">
            <div class="cover">
              <img src="covers/rapper.jpg" alt="Grebz — реппеr" loading="lazy">
            </div>
          </a>

        </div>
      </div>
    </section>

  </div>



<script>
(() => {
  const views = ['home', 'releases'];
  const buttons = document.querySelectorAll('[data-go]');

  function go(view, push) {
    if (!views.includes(view)) view = 'home';
    document.body.dataset.view = view;
    document.querySelectorAll('.nav button').forEach(b =>
      b.classList.toggle('active', b.dataset.go === view)
    );
    if (push !== false) {
      try { history.replaceState(null, '', view === 'home' ? '#' : '#' + view); } catch (e) {}
    }
  }

  buttons.forEach(b => b.addEventListener('click', () => go(b.dataset.go)));

  try {
    const initial = location.hash.replace('#', '');
    if (initial) go(initial, false);
  } catch (e) {}

  window.addEventListener('hashchange', () => {
    go(location.hash.replace('#', '') || 'home', false);
  });
})();
</script>
</body>
</html>
