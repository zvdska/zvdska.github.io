<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sимптом — RADAR</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #FFFFFF;
    --dark: #050706;
    --green: #3DF06A;
    --glass: rgba(10, 12, 11, .55);
    --stroke: rgba(255, 255, 255, .14);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--dark);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* видеофон */
  .bg {
    position: fixed;
    left: 0; right: 0;
    top: -12%;
    width: 100%; height: 112%;
    object-fit: cover;
    z-index: 0;
  }
  /* размытие нижней части видео — скрывает подъём */
  .bottom-blur {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 38%;
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    -webkit-mask-image: linear-gradient(to top, #000 55%, transparent 100%);
    mask-image: linear-gradient(to top, #000 55%, transparent 100%);
    z-index: 1;
    pointer-events: none;
  }
  /* лёгкий градиент снизу, чтобы кнопки читались всегда */
  .shade {
    position: fixed;
    inset: 0;
    background: linear-gradient(rgba(5,7,6,0) 50%, rgba(5,7,6,.65) 100%);
    z-index: 1;
    pointer-events: none;
  }
  /* затемнение между проигрываниями */
  .fader {
    position: fixed;
    inset: 0;
    background: var(--dark);
    opacity: 0;
    transition: opacity .6s ease;
    z-index: 2;
    pointer-events: none;
  }
  .fader.on { opacity: 1; }

  .stage {
    position: fixed;
    inset: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: calc(24px + env(safe-area-inset-top)) 20px calc(18px + env(safe-area-inset-bottom));
  }

  .spacer { flex: 1; }

  /* блок ссылок — выезжает через 3 секунды */
  .panel {
    width: 100%;
    max-width: 420px;
    opacity: 0;
    transform: translateY(46px);
    transition: opacity .7s ease, transform .7s cubic-bezier(.22,.9,.3,1);
  }
  .panel.show {
    opacity: 1;
    transform: none;
  }

  .plat {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 16px 18px;
    margin-bottom: 10px;
    background: var(--glass);
    border: 1px solid var(--stroke);
    border-radius: 16px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    color: var(--ink);
    font-family: inherit;
    font-size: 15.5px;
    font-weight: 600;
    text-align: left;
    cursor: pointer;
    transition: transform .15s ease, border-color .15s;
  }
  .plat:active {
    transform: scale(.98);
    border-color: var(--green);
  }
  .plat .icon {
    width: 22px; height: 22px;
    fill: var(--ink);
    flex-shrink: 0;
  }
  .plat .name { flex: 1; }
  .plat .arrow {
    font-family: 'JetBrains Mono';
    color: var(--green);
    font-size: 14px;
  }

  /* круглые соцсети */
  .socials {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin: 16px 0 14px;
  }
  .soc {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 1px solid var(--stroke);
    background: var(--glass);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: transform .15s ease, border-color .15s;
  }
  .soc:active {
    transform: scale(.92);
    border-color: var(--green);
  }
  .soc .icon {
    width: 20px; height: 20px;
    fill: var(--ink);
    opacity: .92;
  }

  .powered {
    font-family: 'JetBrains Mono';
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: rgba(255,255,255,.5);
    text-align: center;
  }


  /* радарный импульс при нажатии */
  .plat, .soc { position: relative; overflow: visible; }
  .ping {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    border: 1.5px solid var(--green);
    box-shadow: 0 0 20px rgba(61,240,106,.55), inset 0 0 12px rgba(61,240,106,.25);
    opacity: 0;
    pointer-events: none;
    animation: ping .75s ease-out forwards;
  }
  @keyframes ping {
    0%   { opacity: .95; transform: scale(1); }
    100% { opacity: 0; transform: scaleX(1.45) scaleY(2.1); }
  }
  .soc .ping { animation-name: ping-round; }
  @keyframes ping-round {
    0%   { opacity: .95; transform: scale(1); }
    100% { opacity: 0; transform: scale(2); }
  }
  @media (prefers-reduced-motion: reduce) { .ping { display: none; } }

  @media (prefers-reduced-motion: reduce) {
    .panel, .fader { transition: none; }
  }
  .plat:focus-visible, .soc:focus-visible {
    outline: 2px solid var(--green);
    outline-offset: 2px;
  }
</style>
</head>
<body>

<video class="bg" id="bg" src="radar-bg.mp4" autoplay muted playsinline preload="auto" disablepictureinpicture></video>
<div class="bottom-blur"></div>
<div class="shade"></div>
<div class="fader" id="fader"></div>

<div class="stage">
  <div class="spacer"></div>

  <div class="panel" id="panel">
    <button class="plat" data-url="https://music.apple.com/jp/song/radar/6772035011">
      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.53 4.08zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
      <span class="name">Apple Music</span><span class="arrow">↗</span>
    </button>
    <button class="plat" data-url="https://open.spotify.com/track/REPLACE">
      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
      <span class="name">Spotify</span><span class="arrow">↗</span>
    </button>
    <button class="plat" data-url="https://music.youtube.com/watch?v=UbstFTRX2Wk">
      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 0C5.376 0 0 5.376 0 12s5.376 12 12 12 12-5.376 12-12S18.624 0 12 0zm0 19.104c-3.924 0-7.104-3.18-7.104-7.104S8.076 4.896 12 4.896s7.104 3.18 7.104 7.104-3.18 7.104-7.104 7.104zm0-13.332c-3.432 0-6.228 2.796-6.228 6.228S8.568 18.228 12 18.228s6.228-2.796 6.228-6.228S15.432 5.772 12 5.772zM9.684 15.54V8.46L15.816 12l-6.132 3.54z"/></svg>
      <span class="name">YouTube Music</span><span class="arrow">↗</span>
    </button>
    <div class="socials">
      <button class="soc" data-url="https://instagram.com/simptomaponika" aria-label="Instagram">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
      </button>
      <button class="soc" data-tg="https://t.me/iamsimptom" aria-label="Telegram">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
      </button>
      <button class="soc" data-url="https://youtube.com/@user-fp9ps4jq4n" aria-label="YouTube">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
      </button>
    </div>

    <div class="powered">Powered by zvdsk</div>
  </div>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#050706');
    tg.setBackgroundColor('#050706');
  }

  const bg = document.getElementById('bg');
  const fader = document.getElementById('fader');
  const panel = document.getElementById('panel');

  // страховка автоплея
  bg.muted = true;
  bg.defaultMuted = true;
  const kick = () => bg.play().catch(() => {});
  kick();
  window.addEventListener('load', kick);
  document.addEventListener('touchstart', kick, { once: true });

  // через 3 секунды — площадки снизу
  setTimeout(() => panel.classList.add('show'), 3000);

  // конец видео: затемнение → рестарт → обложка сверху
  bg.addEventListener('ended', () => {
    fader.classList.add('on');
    setTimeout(() => {
      bg.currentTime = 0;
      bg.play().catch(() => {});
      fader.classList.remove('on');
    }, 650);
  });


  function radarPing(el) {
    for (const delay of [0, 180]) {
      setTimeout(() => {
        const p = document.createElement('span');
        p.className = 'ping';
        el.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }, delay);
    }
  }

  function openUrl(el) {
    radarPing(el);
    const url = el.dataset.url, tgUrl = el.dataset.tg;
    tg?.HapticFeedback?.impactOccurred('light');
    if (tgUrl) {
      tg ? tg.openTelegramLink(tgUrl) : window.open(tgUrl, '_blank');
    } else if (url) {
      tg ? tg.openLink(url) : window.open(url, '_blank');
    }
  }

  document.querySelectorAll('[data-url], [data-tg]').forEach(el => {
    el.addEventListener('click', () => openUrl(el));
  });
</script>
</body>
</html>
