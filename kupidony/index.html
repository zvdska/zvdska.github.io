<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>КУПІДОНИ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1A1A1A;
    --light-bg: #F8F7F5;
    --white: #FFFFFF;
    --dark: #050706;
    --pink: #E94B7E;
    --pink-light: #F07BA5;
    --glass: rgba(255, 255, 255, .75);
    --stroke: rgba(225, 75, 126, .25);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--light-bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* размытый фон обложки */
  .bg {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: brightness(.7) saturate(1.3);
    z-index: 0;
  }
  /* анимированный розовый градиент поверх */
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at var(--gx, 30%) var(--gy, 30%), rgba(233, 75, 126, .35) 0%, rgba(240, 123, 165, .15) 40%, transparent 70%);
    animation: float 12s ease-in-out infinite;
    z-index: 0;
    pointer-events: none;
  }
  @keyframes float {
    0%, 100% { --gx: 30%; --gy: 30%; }
    25% { --gx: 70%; --gy: 20%; }
    50% { --gx: 60%; --gy: 70%; }
    75% { --gx: 20%; --gy: 60%; }
  }
  .shade {
    position: fixed;
    inset: 0;
    background: linear-gradient(rgba(248,247,245,0) 40%, rgba(248,247,245,.85) 100%);
    z-index: 1;
    pointer-events: none;
  }

  .stage {
    position: fixed;
    inset: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: calc(48px + env(safe-area-inset-top)) 20px calc(18px + env(safe-area-inset-bottom));
  }

  /* интерактивная обложка */
  .cover {
    width: min(56vw, 260px);
    aspect-ratio: 1;
    border-radius: 20px;
    box-shadow: 0 24px 70px rgba(0,0,0,.65);
    cursor: pointer;
    transform: perspective(1200px) rotateX(0) rotateY(0) scale(1) translateY(0);
    transition: all .8s cubic-bezier(.22,.9,.3,1);
    opacity: 1;
  }
  .cover.hide {
    opacity: 0;
    transform: perspective(1200px) rotateX(0) rotateY(0) scale(0.8) translateY(-80px);
  }


  .spacer { flex: 1; }

  /* блок ссылок */
  .panel {
    width: 100%;
    max-width: 420px;
    opacity: 0;
    transform: translateY(46px);
    transition: opacity .7s ease, transform .7s cubic-bezier(.22,.9,.3,1);
  }
  .panel.show {
    opacity: 1;
    transform: none;
  }

  .plat {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 12px 16px;
    margin-bottom: 7px;
    background: var(--white);
    border: 1.5px solid var(--stroke);
    border-radius: 16px;
    color: var(--ink);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    text-align: left;
    cursor: pointer;
    position: relative;
    overflow: visible;
    transition: transform .15s ease, border-color .15s, box-shadow .2s;
    box-shadow: 0 4px 16px rgba(233, 75, 126, .12);
  }
  .plat:active {
    transform: scale(.98);
    border-color: var(--pink);
    box-shadow: 0 8px 24px rgba(233, 75, 126, .2);
  }
  .plat .icon {
    width: 18px; height: 18px;
    fill: var(--ink);
    flex-shrink: 0;
    opacity: .9;
  }
  .plat .name { flex: 1; }
  .plat .arrow {
    font-family: 'JetBrains Mono';
    color: var(--pink);
    font-size: 14px;
  }

  /* радарный импульс */
  .ping {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    border: 1.5px solid var(--pink);
    box-shadow: 0 0 20px rgba(233, 75, 126, .65), inset 0 0 12px rgba(233, 75, 126, .3);
    opacity: 0;
    pointer-events: none;
    animation: ping .75s ease-out forwards;
  }
  @keyframes ping {
    0%   { opacity: .95; transform: scale(1); }
    100% { opacity: 0; transform: scaleX(1.45) scaleY(2.1); }
  }

  /* соцсети */
  .socials {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin: 16px 0 14px;
  }
  .soc {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 1.5px solid var(--stroke);
    background: var(--white);
    display: grid;
    place-items: center;
    cursor: pointer;
    position: relative;
    overflow: visible;
    transition: transform .15s ease, border-color .15s, box-shadow .2s;
    box-shadow: 0 2px 8px rgba(233, 75, 126, .1);
  }
  .soc:active {
    transform: scale(.92);
    border-color: var(--pink);
    box-shadow: 0 4px 14px rgba(233, 75, 126, .25);
  }
  .soc .icon {
    width: 20px; height: 20px;
    fill: var(--ink);
    opacity: .92;
  }
  .soc .ping {
    animation-name: ping-round;
  }
  @keyframes ping-round {
    0%   { opacity: .95; transform: scale(1); }
    100% { opacity: 0; transform: scale(2); }
  }

  .powered {
    font-family: 'JetBrains Mono';
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: rgba(26, 26, 26, .65);
    text-align: center;
  }


  @media (prefers-reduced-motion: reduce) {
    .cover, .panel { transition: none; }
    .ping { display: none; }
  }
  .plat:focus-visible, .soc:focus-visible {
    outline: 2px solid var(--green);
    outline-offset: 2px;
  }
</style>
</head>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#050706');
    tg.setBackgroundColor('#050706');
  }

  const panel = document.getElementById('panel');
  const cover = document.getElementById('cover');

  // через 3 секунды — площадки выезжают
  setTimeout(() => panel.classList.add('show'), 3000);

  function radarPing(el) {
    for (const delay of [0, 180]) {
      setTimeout(() => {
        const p = document.createElement('span');
        p.className = 'ping';
        el.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }, delay);
    }
  }

  // === учёт кликов TYRAZH ===
  const TRACK_SLUG = "kupidoni";
  const CLICK_ENDPOINT = "https://ktfmjaanheowyzjrovkc.supabase.co/functions/v1/track-click";

  function platformFromEl(el) {
    const u = (el.dataset.url || el.dataset.tg || "").toLowerCase();
    if (u.includes("spotify"))   return "spotify";
    if (u.includes("apple"))     return "apple";
    if (u.includes("youtube"))   return "youtube";
    if (u.includes("instagram")) return "instagram";
    if (u.includes("tiktok"))    return "tiktok";
    return null;
  }
  function logClick(platform) {
    try {
      const body = JSON.stringify({ slug: TRACK_SLUG, platform });
      navigator.sendBeacon(CLICK_ENDPOINT, new Blob([body], { type: "application/json" }));
    } catch (_) {}
  }

  function openUrl(el) {
    const url = el.dataset.url, tgUrl = el.dataset.tg;
    const p = platformFromEl(el);
    if (p) logClick(p);
    radarPing(el);
    tg?.HapticFeedback?.impactOccurred('light');
    if (tgUrl) {
      tg ? tg.openTelegramLink(tgUrl) : window.open(tgUrl, '_blank');
    } else if (url) {
      tg ? tg.openLink(url) : window.open(url, '_blank');
    }
  }

  document.querySelectorAll('[data-url], [data-tg]').forEach(el => {
    el.addEventListener('click', () => openUrl(el));
  });



</script>
