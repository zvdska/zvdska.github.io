  :root {
    --white: #FFFFFF;
    --black: #000000;
    --field: #FFFFFF;
    --field-ink: #1A1A1A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--black);
    font-family: 'Google Sans Code', 'Google Sans', -apple-system, sans-serif;
    overflow: hidden;
    color: var(--white);
  }

  /* видеофон — размытый */
  .bg {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: blur(40px) brightness(.8);
    transform: scale(1.2);
    z-index: 0;
  }
  /* затемнение по краям, чтобы карточка читалась */
  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 70% at 50% 50%, transparent 30%, rgba(0,0,0,.85) 100%);
    z-index: 1;
    pointer-events: none;
  }

  /* стрелка назад на главную */
  .back {
    position: fixed;
    top: calc(20px + env(safe-area-inset-top));
    left: calc(20px + env(safe-area-inset-left));
    z-index: 5;
    width: 44px; height: 44px;
    display: grid; place-items: center;
    border-radius: 50%;
    background: rgba(255,255,255,.08);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.12);
    cursor: pointer;
    transition: background .15s, transform .15s;
    text-decoration: none;
  }
  .back:hover { background: rgba(255,255,255,.16); transform: translateX(-2px); }
  .back svg { width: 20px; height: 20px; stroke: var(--white); fill: none; stroke-width: 2; }

  /* карточка входа */
  .wrap {
    position: relative;
    z-index: 3;
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    padding: 48px 56px 56px;
    border-radius: 28px;
    background: rgba(255,255,255,.06);
    backdrop-filter: blur(30px) saturate(1.2);
    -webkit-backdrop-filter: blur(30px) saturate(1.2);
    border: 1px solid rgba(255,255,255,.12);
    box-shadow: 0 30px 80px rgba(0,0,0,.5);
    text-align: center;
  }

  /* логотип */
  .logo {
    font-family: 'Gigantic';
    font-size: clamp(56px, 14vw, 76px);
    line-height: .9;
    letter-spacing: .01em;
    color: var(--white);
  }
  .for-artist {
    font-family: 'Google Sans Code', sans-serif;
    font-weight: 500;
    font-size: clamp(26px, 6vw, 34px);
    margin-top: 2px;
    margin-bottom: 44px;
    letter-spacing: -.01em;
  }

  /* поля */
  .field {
    width: 100%;
    padding: 15px 24px;
    margin-bottom: 14px;
    border: none;
    border-radius: 999px;
    background: var(--field);
    color: var(--field-ink);
    font-family: 'Google Sans Code', sans-serif;
    font-size: 16px;
    font-weight: 500;
    text-align: center;
  }
  .field::placeholder { color: #9A9A9A; }
  .field:focus { outline: 2px solid rgba(255,255,255,.5); outline-offset: 2px; }

  /* кнопка */
  .login-btn {
    width: 100%;
    padding: 16px;
    margin-top: 16px;
    border: none;
    border-radius: 999px;
    background: var(--black);
    color: var(--white);
    font-family: 'Google Sans Code', sans-serif;
    font-size: 17px;
    font-weight: 500;
    cursor: pointer;
    transition: transform .15s, opacity .15s;
  }
  .login-btn:hover { opacity: .85; }
  .login-btn:active { transform: scale(.98); }
  .login-btn:disabled { opacity: .5; cursor: default; }

  .err {
    margin-top: 16px;
    font-size: 13px;
    color: #FF8080;
    min-height: 18px;
    font-weight: 500;
  }

  @media (prefers-reduced-motion: reduce) {
    .bg { filter: blur(40px) brightness(.8); }
  }
  @media (max-width: 480px) {
    .card { padding: 40px 32px 44px; }
  }
</style>

  <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
</a>

<div class="wrap">
  <div class="card">
    <div class="logo">TYRAZH</div>
    <div class="for-artist">for Artist</div>

    <input class="field" id="login" type="text" autocomplete="username" placeholder="логин" value="">
    <input class="field" id="pass" type="password" autocomplete="current-password" placeholder="пароль">

    <button class="login-btn" id="loginBtn">Log in</button>
    <div class="err" id="err"></div>
  </div>
</div>

<script>
  // ====== НАСТРОЙКА (из Supabase → Settings → API) ======
  const SUPABASE_URL = "https://ТВОЙ-ПРОЕКТ.supabase.co";
  const SUPABASE_ANON_KEY = "ТВОЙ-ANON-КЛЮЧ";
  const DASHBOARD_URL = "dashboard.html"; // куда вести после входа
  // ======================================================

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const loginInput = document.getElementById('login');
  const passInput = document.getElementById('pass');
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('err');

  // логин может быть коротким (simptom) — достраиваем до служебного email
  function toEmail(v) {
    v = v.trim();
    return v.includes('@') ? v : v + '@tyrazh.app';
  }

  async function login() {
    err.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Вход…';
    const { error } = await db.auth.signInWithPassword({
      email: toEmail(loginInput.value),
      password: passInput.value,
    });
    if (error) {
      err.textContent = 'Неверный логин или пароль';
      btn.disabled = false;
      btn.textContent = 'Log in';
      return;
    }
    window.location.href = DASHBOARD_URL;
  }

  btn.addEventListener('click', login);
  passInput.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  loginInput.addEventListener('keydown', e => { if (e.key === 'Enter') passInput.focus(); });

  // если уже залогинен — сразу на дашборд
  (async () => {
    const { data } = await db.auth.getSession();
    if (data?.session) window.location.href = DASHBOARD_URL;
  })();

  // страховка автоплея видео
  const bg = document.getElementById('bg');
  bg.play?.().catch(() => {});
  document.addEventListener('touchstart', () => bg.play?.().catch(() => {}), { once: true });
</script>
</body>
</html>
