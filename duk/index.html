  :root { --ink:#FFFFFF; --dark:#0a0a0a; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body { background:var(--dark); color:var(--ink); font-family:-apple-system,sans-serif; overflow:hidden; -webkit-font-smoothing:antialiased; }

  /* видео на весь экран, НЕ размытое */
  .bg { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; filter:grayscale(1) brightness(.5); z-index:0; }
  .bg-shade { position:fixed; inset:0; background:rgba(10,10,10,.35); z-index:1; pointer-events:none; }

  /* центрируем карточку */
  .wrap { position:fixed; inset:0; z-index:3; display:flex; align-items:center; justify-content:center; padding:24px; }

  /* WALLET-КАРТОЧКА */
  .card {
    position:relative;
    width:100%; max-width:360px;
    aspect-ratio:100/150;
    border-radius:26px;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.65), 0 2px 0 rgba(255,255,255,.08) inset;
    opacity:0; transform:translateY(24px) scale(.96);
    transition:opacity .9s ease, transform .9s cubic-bezier(.22,.9,.3,1);
  }
  .card.show { opacity:1; transform:none; }

  /* обложка на всю карту */
  .card-cover { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
  /* лёгкая вуаль снизу для читаемости кнопок */
  .card-veil { position:absolute; inset:0; z-index:1; pointer-events:none;
    background:linear-gradient(rgba(0,0,0,.15) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0) 55%, rgba(0,0,0,.55) 100%); }

  .card-inner { position:absolute; inset:0; z-index:2; display:flex; flex-direction:column; align-items:center; padding:26px 22px; }

  /* титул сверху (шаг 3) */
  .titles { display:flex; flex-direction:column; align-items:center; gap:10px;
    opacity:0; transform:translateY(-16px); transition:opacity .8s ease, transform .8s cubic-bezier(.22,.9,.3,1); }
  .titles.show { opacity:1; transform:none; }
  .t-diff { width:min(56vw,190px); }
  .t-div  { width:min(44vw,150px); opacity:.85; }
  .t-know { width:min(42vw,140px); margin-top:-2px; }

  .spacer { flex:1; }

  /* исполнители S / 4 (шаг 2) */
  .artists { display:flex; align-items:flex-end; justify-content:space-between; width:100%; margin-bottom:14px; }
  .artist { font-family:'Gigantic'; font-size:40px; line-height:1; color:var(--ink); cursor:pointer;
    text-shadow:0 2px 12px rgba(0,0,0,.5);
    opacity:0; transform:translateY(16px); transition:opacity .7s ease, transform .7s cubic-bezier(.22,.9,.3,1), color .2s;
    -webkit-user-select:none; user-select:none; }
  .artist.show { opacity:1; transform:none; }
  .artist:active { color:rgba(255,255,255,.55); }
  .artist.left { transition-delay:.05s; }
  .artist.right { transition-delay:.15s; }

  /* круглые кнопки площадок (шаг 4) */
  .platforms { display:flex; align-items:center; justify-content:center; gap:20px; width:100%;
    opacity:0; transform:translateY(18px); transition:opacity .7s ease, transform .7s cubic-bezier(.22,.9,.3,1); }
  .platforms.show { opacity:1; transform:none; }
  .pbtn { width:54px; height:54px; border-radius:50%;
    background:rgba(10,10,10,.55); border:1px solid rgba(255,255,255,.3);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    display:grid; place-items:center; cursor:pointer; position:relative; overflow:hidden;
    transition:transform .15s, background .2s; }
  .pbtn:active { transform:scale(.92); background:rgba(30,30,30,.7); }
  .pbtn svg { width:24px; height:24px; fill:#fff; }
  .pbtn .rip { position:absolute; inset:0; border-radius:50%; border:1.5px solid rgba(255,255,255,.7); opacity:0; pointer-events:none; animation:rip .7s ease-out forwards; }
  @keyframes rip { 0%{opacity:.9; transform:scale(1);} 100%{opacity:0; transform:scale(1.7);} }

  .powered { position:fixed; bottom:calc(16px + env(safe-area-inset-bottom)); left:0; right:0; z-index:4;
    font-size:9px; letter-spacing:.24em; text-transform:uppercase; color:rgba(255,255,255,.4); text-align:center;
    opacity:0; transition:opacity 1s ease; }
  .powered.show { opacity:1; }

  @media (prefers-reduced-motion: reduce) {
    .card,.titles,.artist,.platforms,.powered { transition:none; opacity:1; transform:none; }
  }
</style>
</head>

<video class="bg" id="bg" src="uknow-bg.mp4" autoplay muted loop playsinline preload="auto" disablepictureinpicture></video>
<div class="bg-shade"></div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#0a0a0a'); tg.setBackgroundColor('#0a0a0a'); }

  const bg = document.getElementById('bg');
  bg.muted = true; bg.defaultMuted = true;
  const kick = () => bg.play().catch(()=>{});
  kick(); window.addEventListener('load', kick);
  document.addEventListener('touchstart', kick, { once:true });

  const card = document.getElementById('card');
  const titles = document.getElementById('titles');
  const platforms = document.getElementById('platforms');
  const powered = document.getElementById('powered');
  const artists = document.querySelectorAll('.artist');

  // карточка появляется сразу, внутри — поочерёдно
  setTimeout(() => card.classList.add('show'), 300);
  setTimeout(() => artists.forEach(a => a.classList.add('show')), 800);   // шаг 2: S/4
  setTimeout(() => titles.classList.add('show'), 1500);                    // шаг 3: титул
  setTimeout(() => platforms.classList.add('show'), 2300);                 // шаг 4: кнопки
  setTimeout(() => powered.classList.add('show'), 3000);

  // === учёт кликов TYRAZH ===
  const TRACK_SLUG = "uknow";
  const CLICK_ENDPOINT = "https://ktfmjaanheowyzjrovkc.supabase.co/functions/v1/track-click";
  function logClick(platform) {
    const body = JSON.stringify({ slug: TRACK_SLUG, platform });
    try { return fetch(CLICK_ENDPOINT, { method:"POST", headers:{"content-type":"application/json"}, body, keepalive:true }).catch(()=>{}); }
    catch (_) { return Promise.resolve(); }
  }
  function ripple(el) { const r=document.createElement('span'); r.className='rip'; el.appendChild(r); r.addEventListener('animationend',()=>r.remove()); }

  function openUrl(el) {
    const url = el.dataset.url, p = el.dataset.p;
    if (el.classList.contains('pbtn')) ripple(el);
    tg?.HapticFeedback?.impactOccurred('light');
    let done = false;
    const go = () => { if (done) return; done = true; if (!url || url === '#') return; tg ? tg.openLink(url) : window.open(url,'_blank'); };
    if (tg) { if (p) logClick(p); go(); }
    else if (p) { logClick(p).finally(go); setTimeout(go, 500); }
    else { go(); }
  }
  document.querySelectorAll('[data-url]').forEach(el => el.addEventListener('click', () => openUrl(el)));
</script>
</body>
</html>
