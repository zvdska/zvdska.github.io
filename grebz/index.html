<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GREBZ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0b0b12;
    --paper:#f4f3ef;

    /* blue world — MC COMING */
    --blue-1:#5a2bf0;
    --blue-2:#1f93ff;
    --blue-deep:#1430c9;

    /* orange world — STYLE IN MC */
    --orange-1:#ff5630;
    --orange-2:#ff8a3a;
    --orange-deep:#e23a12;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:"Space Grotesk",system-ui,sans-serif;
    background:#06060a;
    color:#fff;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}

  /* ---------- header ---------- */
  .nav{
    position:fixed;top:0;left:0;right:0;z-index:50;
    display:flex;align-items:center;justify-content:space-between;
    padding:18px clamp(18px,4vw,48px);
    transition:background .3s ease, padding .3s ease;
  }
  .nav.scrolled{background:rgba(6,6,10,.72);backdrop-filter:blur(10px);padding-top:12px;padding-bottom:12px}
  .nav__brand{
    font-family:"Anton",sans-serif;font-size:clamp(20px,3vw,26px);
    letter-spacing:.04em;line-height:1;
  }
  .nav__links{display:flex;gap:22px;font-size:13px;letter-spacing:.14em;text-transform:uppercase}
  .nav__links a{opacity:.75;transition:opacity .2s}
  .nav__links a:hover{opacity:1}
  @media(max-width:560px){.nav__links{display:none}}

  /* ---------- intro / split signature ---------- */
  .intro{
    min-height:100svh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;position:relative;overflow:hidden;
    background:linear-gradient(118deg,
      var(--blue-1) 0%, var(--blue-2) 47%,
      var(--orange-1) 53%, var(--orange-2) 100%);
  }
  .intro::after{ /* seam highlight */
    content:"";position:absolute;inset:0;
    background:linear-gradient(118deg,transparent 49.4%,rgba(255,255,255,.55) 50%,transparent 50.6%);
    mix-blend-mode:overlay;pointer-events:none;
  }
  .intro__eyebrow{
    position:relative;z-index:2;
    font-size:13px;letter-spacing:.42em;text-transform:uppercase;
    margin-bottom:18px;opacity:.92;
  }
  .intro__name{
    position:relative;z-index:2;
    font-family:"Anton",sans-serif;
    font-size:clamp(78px,22vw,300px);line-height:.82;
    letter-spacing:.01em;text-transform:uppercase;
    text-shadow:0 8px 40px rgba(0,0,0,.28);
  }
  .intro__sub{
    position:relative;z-index:2;margin-top:22px;
    font-size:clamp(13px,1.6vw,16px);letter-spacing:.18em;text-transform:uppercase;opacity:.9;
  }
  .scrollcue{
    position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:2;
    font-size:11px;letter-spacing:.3em;text-transform:uppercase;opacity:.85;
    display:flex;flex-direction:column;align-items:center;gap:8px;
  }
  .scrollcue span{display:block;width:1px;height:34px;background:#fff;opacity:.6;animation:drop 1.8s infinite}
  @keyframes drop{0%{transform:scaleY(.2);transform-origin:top;opacity:0}40%{opacity:.8}100%{transform:scaleY(1);transform-origin:top;opacity:0}}

  /* ---------- release panel ---------- */
  .panel{
    position:relative;min-height:100svh;
    display:flex;align-items:center;overflow:hidden;
    padding:120px clamp(20px,6vw,90px);
  }
  .panel__bg{
    position:absolute;inset:0;z-index:0;
    background-repeat:no-repeat;background-size:cover;
  }
  .panel__figures{display:none} /* mobile only */

  .panel--blue{background:linear-gradient(125deg,var(--blue-1),var(--blue-2))}
  .panel--blue .panel__bg{
    background-image:url("dwb.png");
    background-position:right center;
  }
  .panel--blue{ --deep:var(--blue-deep) }
  .panel--blue .panel__inner{margin-right:auto}

  .panel--orange{background:linear-gradient(165deg,var(--orange-1),var(--orange-2))}
  .panel--orange .panel__bg{
    background-image:url("43пц.png");
    background-position:left center;
  }
  .panel--orange{ --deep:var(--orange-deep) }
  .panel--orange .panel__inner{margin-left:auto;text-align:right;align-items:flex-end}

  .panel__inner{
    position:relative;z-index:2;
    width:min(560px,46vw);
    display:flex;flex-direction:column;align-items:flex-start;
    transition:opacity .25s linear, transform .25s linear;
    will-change:opacity, transform;
  }
  .panel__bg{transition:opacity .25s linear;}

  .release__tag{
    font-size:12px;letter-spacing:.34em;text-transform:uppercase;
    display:inline-flex;align-items:center;gap:10px;margin-bottom:18px;
  }
  .release__tag::before{content:"";width:30px;height:2px;background:#fff}
  .panel--orange .release__tag{flex-direction:row-reverse}

  .release__title{
    font-family:"Anton",sans-serif;
    font-size:clamp(54px,8vw,118px);line-height:.84;
    text-transform:uppercase;letter-spacing:.005em;
    text-shadow:0 6px 30px rgba(0,0,0,.25);
  }

  .cover{
    margin:0 0 34px;
    width:clamp(240px,27vw,400px);aspect-ratio:1/1;
    border-radius:14px;overflow:hidden;
    box-shadow:0 22px 60px rgba(0,0,0,.4);
    background:linear-gradient(135deg,var(--blue-1),var(--blue-2));
    transform:perspective(900px) rotateX(0) rotateY(0) translateY(0);
    transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.2,.8,.2,1), box-shadow .4s ease;
    will-change:transform;
  }
  .panel--orange .cover{background:linear-gradient(135deg,var(--orange-1),var(--orange-2))}
  .cover img{width:100%;height:100%;object-fit:cover;pointer-events:none}
  .cover::after{ /* moving sheen, follows cursor */
    content:"";position:absolute;inset:0;border-radius:14px;pointer-events:none;
    background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,.32),rgba(255,255,255,0) 45%);
    opacity:0;transition:opacity .4s ease;
  }
  .cover{position:relative}
  .cover.tilting{transition:transform .08s linear, box-shadow .4s ease;box-shadow:0 30px 70px rgba(0,0,0,.55)}
  .cover.tilting::after{opacity:1}

  /* ---------- streaming buttons ---------- */
  .listen-label{
    font-size:11px;letter-spacing:.3em;text-transform:uppercase;opacity:.85;margin-bottom:14px;
  }
  .links{display:flex;flex-wrap:wrap;gap:12px}
  .panel--orange .links{justify-content:flex-end}
  .btn{
    display:inline-flex;align-items:center;gap:10px;
    padding:13px 20px;border-radius:999px;
    background:#fff;color:var(--ink);
    font-size:14px;font-weight:700;letter-spacing:.02em;
    transition:transform .2s ease, background .2s ease, color .2s ease, box-shadow .2s ease;
    box-shadow:0 4px 16px rgba(0,0,0,.18);
  }
  .btn svg{width:20px;height:20px;flex:none}
  .btn:hover{background:var(--deep);color:#fff;transform:translateY(-3px);box-shadow:0 10px 26px rgba(0,0,0,.32)}
  .btn:focus-visible{outline:3px solid #fff;outline-offset:3px}

  /* ---------- footer ---------- */
  .foot{
    padding:54px clamp(20px,6vw,90px) 70px;
    background:#06060a;
    display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:18px;
    border-top:1px solid rgba(255,255,255,.08);
  }
  .foot__brand{font-family:"Anton",sans-serif;font-size:clamp(40px,9vw,96px);line-height:.85;letter-spacing:.02em}
  .foot__meta{font-size:12px;letter-spacing:.18em;text-transform:uppercase;opacity:.6;text-align:right;line-height:1.9}

  /* ---------- responsive ---------- */
  @media(max-width:820px){
    .panel{padding:96px 22px 70px;min-height:auto}
    .panel__bg{display:none}
    .panel__figures{
      display:block;width:100%;margin-top:8px;
      filter:drop-shadow(0 18px 40px rgba(0,0,0,.35));
    }
    .panel__inner{width:100%;align-items:center !important;text-align:center !important;margin:0 auto !important}
    .panel--orange .links,.links{justify-content:center}
    .release__tag,.panel--orange .release__tag{flex-direction:row}
    .panel--orange .panel__inner{text-align:center}
  }
  @media(prefers-reduced-motion:reduce){
    .panel__inner{opacity:1;transform:none;transition:none}
    .scrollcue span{animation:none}
    html{scroll-behavior:auto}
  }
</style>
</head>
<body>

  <header class="nav" id="nav">

<script>
  // header background on scroll
  const nav = document.getElementById('nav');
  const onScroll = () => nav.classList.toggle('scrolled', window.scrollY > 40);
  onScroll();
  window.addEventListener('scroll', onScroll, {passive:true});

  // smooth scroll-linked fade: panels ease in as they reach center, ease out as they leave
  const reduceMo = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const panels = [...document.querySelectorAll('.panel')].map(p=>({
    el:p, inner:p.querySelector('.panel__inner'), bg:p.querySelector('.panel__bg')
  }));
  const smoothstep = t => t*t*(3-2*t);
  function updateFade(){
    const vh = window.innerHeight;
    for(const {el,inner,bg} of panels){
      const r = el.getBoundingClientRect();
      const center = r.top + r.height/2;
      const d = Math.abs(center - vh/2);
      const plateau = vh*0.32;            // fully visible band around center
      const edge = vh*0.95;               // fully faded distance
      let o = 1 - (d - plateau)/(edge - plateau);
      o = Math.max(0, Math.min(1, o));
      o = smoothstep(o);
      const y = (1 - o) * 40;             // drift up/down as it enters/leaves
      const dir = center < vh/2 ? -1 : 1; // leaving up vs entering down
      if(inner){
        inner.style.opacity = o;
        inner.style.transform = `translateY(${(y*dir).toFixed(1)}px)`;
      }
      if(bg) bg.style.opacity = (0.25 + o*0.75).toFixed(3); // figures never fully vanish
    }
  }
  if(!reduceMo){
    let ticking = false;
    const req = ()=>{ if(!ticking){ ticking = true; requestAnimationFrame(()=>{ updateFade(); ticking=false; }); } };
    window.addEventListener('scroll', req, {passive:true});
    window.addEventListener('resize', req, {passive:true});
    updateFade();
  }

  // 3D tilt on covers (skipped if reduced motion or touch)
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const coarse = window.matchMedia('(pointer: coarse)').matches;
  if(!reduce && !coarse){
    const MAX = 14; // max tilt in degrees
    document.querySelectorAll('.cover').forEach(card=>{
      let raf = null;
      const move = (ev)=>{
        const r = card.getBoundingClientRect();
        const px = (ev.clientX - r.left) / r.width;   // 0..1
        const py = (ev.clientY - r.top) / r.height;   // 0..1
        const ry = (px - .5) * 2 * MAX;               // left/right
        const rx = (.5 - py) * 2 * MAX;               // up/down
        if(raf) cancelAnimationFrame(raf);
        raf = requestAnimationFrame(()=>{
          card.style.transform =
            `perspective(900px) rotateX(${rx.toFixed(2)}deg) rotateY(${ry.toFixed(2)}deg) translateY(-6px) scale(1.04)`;
          card.style.setProperty('--mx', (px*100).toFixed(1)+'%');
          card.style.setProperty('--my', (py*100).toFixed(1)+'%');
        });
      };
      card.addEventListener('mouseenter', ()=>card.classList.add('tilting'));
      card.addEventListener('mousemove', move);
      card.addEventListener('mouseleave', ()=>{
        card.classList.remove('tilting');
        if(raf) cancelAnimationFrame(raf);
        card.style.transform = 'perspective(900px) rotateX(0) rotateY(0) translateY(0)';
      });
    });
  }
</script>
</body>
