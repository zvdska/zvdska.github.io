<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>FROM KRBK SHOP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- ШРИФТ: тимчасові. Заміниш на свій, коли скажеш. -->
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;800&family=Archivo:wght@400;500;600&family=Archivo+Expanded:wght@500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════════
   ⚙️  Налаштування — у блоці CONFIG нижче (<script>): ① оплата, ② товари.
   ════════════════════════════════════════════════════════════════ */
:root{
  --ink:#050505; --navy:#101012; --navy-2:#17171a; --navy-3:#1e1e22; /* чорна основа + вугільні картки */
  --text:#F0EEEA; --muted:#8A857E;
  --line:rgba(255,255,255,.08); --line-2:rgba(255,255,255,.14);
  --accent:#C56B3D; --accent-2:#E08A55; --ok:#7FE0A8; /* терракота з баннера FROM KRBK CAP */
  --card-r:28px;          /* радіус скруглення карток (як у GREBZ) */
  --stick-top:74px;       /* де картка «прилипає» під шапкою */
  --card-h:80svh;         /* висота картки у стопці */
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--ink);color:var(--text);
  font-family:'Archivo',system-ui,sans-serif;line-height:1.5;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(120% 60% at 50% -10%, rgba(197,107,61,.13), transparent 60%)}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.mono{font-family:'Space Mono',monospace}
.wrap{max-width:560px;margin:0 auto;padding:0 16px;position:relative;z-index:1}

/* ── шапка ── */
header{position:fixed;top:0;left:0;right:0;z-index:40;background:transparent;
  transition:transform .35s cubic-bezier(.2,.7,.2,1),background-color .25s ease,border-color .25s ease;
  border-bottom:1px solid transparent}
header.hide{transform:translateY(-100%)}
header.solid{background:#fff;border-bottom-color:#ececec}
header.solid .logo{color:#0a0a0a}
header.solid .icn-btn{color:#0a0a0a}
.bar{display:flex;align-items:center;justify-content:space-between;height:60px;
  max-width:560px;margin:0 auto;padding:0 16px}
.logo{font-family:'Archivo Expanded',sans-serif;font-weight:600;font-size:15px;
  letter-spacing:.06em;text-transform:uppercase;color:#fff;white-space:nowrap;transition:color .25s ease}
.cart-btn{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.18em;
  text-transform:uppercase;border:1px solid var(--line-2);border-radius:99px;
  padding:9px 14px;transition:border-color .2s,background .2s}
.cart-btn:hover{border-color:var(--accent);background:var(--navy-2)}
.cart-count{font-family:'Space Mono',monospace;font-size:12px;background:var(--accent);
  color:#fff;border-radius:99px;min-width:20px;height:20px;display:inline-grid;
  place-items:center;padding:0 5px}
.cart-count.empty{background:transparent;color:var(--muted);border:1px solid var(--line-2)}

/* ── інтро ── */
.hero{padding:12px 0 8px}
  .banner{display:block;width:100%;border-radius:var(--card-r);overflow:hidden;
    border:1px solid var(--line-2);box-shadow:0 24px 56px rgba(0,0,0,.55);
    background:var(--navy)}
  .banner img{width:100%;height:auto;display:block}
.eyebrow{font-family:'Archivo Expanded',sans-serif;font-weight:500;font-size:11px;
  letter-spacing:.32em;text-transform:uppercase;color:var(--muted)}
.hero h1{font-family:'Unbounded',sans-serif;font-weight:300;font-size:clamp(26px,8vw,40px);
  line-height:1.04;letter-spacing:-.01em;margin:14px 0 12px}
.hero h1 b{font-weight:800}
.hero p{color:var(--muted);font-size:14px;max-width:40ch}

/* ── СТОПКА КАРТОК — sticky-стек (як у GREBZ): кожна прилипає під
      шапкою, наступна наповзає на попередню при скролі ─────────── */
.stack{padding:6px 0 60px;position:relative}
.scard{
  position:sticky; top:var(--stick-top);
  display:block;width:100%;
  height:var(--card-h); max-height:600px;
  margin:0 0 22px;
  border-radius:var(--card-r);
  overflow:hidden;cursor:pointer;
  background:var(--navy);
  border:1px solid var(--line-2);
  transform-origin:50% 0;will-change:transform;
  box-shadow:0 -10px 36px rgba(0,0,0,.34), 0 24px 56px rgba(0,0,0,.5);
  isolation:isolate;
  -webkit-tap-highlight-color:transparent;
  transition:transform .3s cubic-bezier(.2,.7,.2,1);
}
.scard:last-child{margin-bottom:0}
.scard:active{transform:scale(.99)}

/* фото на всю картку */
.scard .bg{position:absolute;inset:0}
.scard .bg img{width:100%;height:100%;object-fit:cover;display:block}
.scard .ph{position:absolute;inset:0;display:grid;place-items:center;
  background:repeating-linear-gradient(45deg,rgba(255,255,255,.018) 0 14px,transparent 14px 28px),
    linear-gradient(160deg,var(--navy-3),var(--navy))}
.scard .ph span{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.2em;
  color:var(--muted);border:1px solid var(--line-2);border-radius:99px;padding:5px 12px;text-transform:uppercase}
/* затемнення під текст */
.scard .grad{position:absolute;inset:0;background:linear-gradient(to top,
  rgba(6,9,18,.92) 0%, rgba(6,9,18,.55) 32%, rgba(6,9,18,0) 60%)}
/* верхня риска-хайлайт, щоб шар читався */
.scard::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);z-index:3}

.scard .top{position:absolute;top:16px;left:18px;right:18px;display:flex;
  justify-content:space-between;z-index:2}
.badge{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;
  text-transform:uppercase;background:rgba(8,11,22,.62);border:1px solid var(--line-2);
  border-radius:99px;padding:5px 11px;backdrop-filter:blur(6px)}
.badge.low{color:var(--ok);border-color:rgba(127,224,168,.4)}
.badge.out{color:var(--muted)}

.scard .info{position:absolute;left:20px;right:20px;bottom:20px;z-index:2}
.scard .kind{font-family:'Space Mono',monospace;font-size:11px;color:#aeb6d4;letter-spacing:.1em}
.scard .name{font-family:'Unbounded',sans-serif;font-weight:400;font-size:clamp(19px,5.5vw,24px);
  line-height:1.08;margin:5px 0 3px}
.scard .artist{font-size:12px;color:var(--muted)}
.scard .priceline{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.scard .price{font-family:'Space Mono',monospace;font-size:17px}
.scard .cta{font-family:'Archivo Expanded',sans-serif;font-size:11px;letter-spacing:.16em;
  text-transform:uppercase;color:#fff;display:flex;align-items:center;gap:7px}
.scard .cta .o{width:30px;height:30px;border-radius:99px;border:1px solid var(--line-2);
  display:grid;place-items:center;font-size:14px}
.scard.sold{filter:saturate(.5)}
.scard.sold .bg img{opacity:.5}
.scard.sold .cta{color:var(--muted)}

/* ── ШТОРКИ ── */
.scrim{position:fixed;inset:0;z-index:50;background:rgba(4,6,14,.7);
  backdrop-filter:blur(5px);opacity:0;visibility:hidden;transition:opacity .28s}
.scrim.open{opacity:1;visibility:visible}

/* детальна картка: скруглена І зверху, І знизу, виїздить знизу */
.detail{position:fixed;z-index:60;left:50%;bottom:0;
  width:min(520px,100vw);max-height:92vh;
  transform:translate(-50%,100%);
  background:var(--navy);border:1px solid var(--line-2);
  border-radius:34px 34px 30px 30px;
  overflow:hidden;display:flex;flex-direction:column;
  transition:transform .4s cubic-bezier(.2,.74,.2,1);
  margin-bottom:env(safe-area-inset-bottom,0);
}
.detail.open{transform:translate(-50%,0)}
.grip{position:absolute;top:9px;left:50%;transform:translateX(-50%);z-index:5;
  width:38px;height:4px;border-radius:99px;background:rgba(255,255,255,.28)}
.dx{position:absolute;top:14px;right:14px;z-index:6;width:34px;height:34px;border-radius:99px;
  background:rgba(8,11,22,.55);border:1px solid var(--line-2);display:grid;place-items:center;font-size:17px}

/* карусель */
.carousel{position:relative;width:100%;aspect-ratio:1/1;background:var(--navy-2);flex:none;overflow:hidden}
.track{display:flex;height:100%;transition:transform .35s cubic-bezier(.2,.7,.2,1);touch-action:pan-y}
.slide{min-width:100%;height:100%}
.slide img{width:100%;height:100%;object-fit:cover;display:block;-webkit-user-drag:none}
.slide .ph{width:100%;height:100%;display:grid;place-items:center;
  background:repeating-linear-gradient(45deg,rgba(255,255,255,.02) 0 14px,transparent 14px 28px),
    linear-gradient(160deg,var(--navy-3),var(--navy))}
.slide .ph span{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--muted);
  border:1px solid var(--line-2);border-radius:99px;padding:6px 12px;text-transform:uppercase}
.nav{position:absolute;top:50%;transform:translateY(-50%);z-index:4;width:38px;height:38px;
  border-radius:99px;background:rgba(8,11,22,.5);border:1px solid var(--line-2);
  display:grid;place-items:center;font-size:18px;backdrop-filter:blur(6px);transition:background .2s}
.nav:hover{background:rgba(8,11,22,.8)}
.nav.prev{left:12px}.nav.next{right:12px}
.nav.hide{display:none}
.dots{position:absolute;bottom:12px;left:0;right:0;display:flex;gap:6px;justify-content:center;z-index:4}
.dot{width:6px;height:6px;border-radius:99px;background:rgba(255,255,255,.35);transition:.25s}
.dot.on{background:#fff;width:18px}

/* тіло детальної картки */
.detail-body{padding:20px 22px 24px;overflow:auto}
.detail-body .kind{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.12em}
.detail-body h3{font-family:'Unbounded',sans-serif;font-weight:300;font-size:23px;line-height:1.1;margin:7px 0 5px}
.detail-body .edition{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted)}
.detail-body .desc{font-size:14px;color:#b6bdd8;margin:14px 0 18px;line-height:1.6}
.flabel{font-family:'Archivo Expanded',sans-serif;font-size:10px;letter-spacing:.24em;
  text-transform:uppercase;color:var(--muted);margin-bottom:9px}
.sizes{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.size{font-family:'Space Mono',monospace;font-size:13px;min-width:48px;text-align:center;
  border:1px solid var(--line-2);border-radius:12px;padding:11px 8px;transition:.15s}
.size:hover{border-color:var(--text)}
.size.sel{background:var(--text);color:var(--ink);border-color:var(--text)}
.sizes.warn{outline:1px solid var(--accent);outline-offset:4px;border-radius:14px}
.detail-foot{display:flex;align-items:center;gap:14px}
.detail-foot .price{font-family:'Space Mono',monospace;font-size:22px;flex:none}
.btn{flex:1;font-family:'Archivo Expanded',sans-serif;font-size:12px;letter-spacing:.16em;
  text-transform:uppercase;background:var(--accent);color:#fff;border-radius:16px;padding:16px;
  transition:filter .2s,opacity .2s}
.btn:hover{filter:brightness(1.12)}
.btn[disabled]{opacity:.4;cursor:not-allowed;filter:none}

/* кошик */
.drawer{position:fixed;z-index:60;top:0;right:0;height:100vh;width:min(440px,100vw);
  transform:translateX(100%);background:var(--navy);border-left:1px solid var(--line-2);
  display:flex;flex-direction:column;transition:transform .34s cubic-bezier(.2,.7,.2,1)}
.drawer.open{transform:translateX(0)}
.drawer-head{display:flex;align-items:center;justify-content:space-between;
  padding:20px 22px 16px;border-bottom:1px solid var(--line)}
.drawer-head .t{font-family:'Unbounded',sans-serif;font-weight:300;font-size:18px;letter-spacing:.04em}
.items{flex:1;overflow:auto;padding:8px 22px}
.empty-cart{color:var(--muted);font-size:14px;text-align:center;padding:60px 0}
.line{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--line)}
.line .li-img{width:62px;height:62px;flex:none;border-radius:14px;overflow:hidden;background:var(--navy-2)}
.line .li-img img{width:100%;height:100%;object-fit:cover}
.line .li-img .ph{width:100%;height:100%}
.line .li-info{flex:1;min-width:0}
.line .li-name{font-size:14px;font-weight:500}
.line .li-sub{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px}
.line .li-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.qty{display:flex;align-items:center;border:1px solid var(--line-2);border-radius:10px}
.qty button{width:30px;height:28px;font-size:15px;color:var(--muted)}
.qty button:hover{color:var(--text)}
.qty span{font-family:'Space Mono',monospace;font-size:13px;min-width:24px;text-align:center}
.li-price{font-family:'Space Mono',monospace;font-size:13px}
.drawer-foot{padding:18px 22px calc(24px + env(safe-area-inset-bottom,0));
  border-top:1px solid var(--line-2);background:var(--ink)}
.totals{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.totals .lbl{font-family:'Archivo Expanded',sans-serif;font-size:11px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--muted)}
.totals .sum{font-family:'Space Mono',monospace;font-size:22px}
.checkout-fields{display:grid;gap:10px;margin-bottom:14px}
.checkout-fields.hidden{display:none}
.inp{width:100%;background:var(--navy-2);border:1px solid var(--line);border-radius:12px;
  color:var(--text);font-family:'Archivo',sans-serif;font-size:14px;padding:12px 13px}
.inp:focus{outline:none;border-color:var(--accent)}
.inp::placeholder{color:var(--muted)}
.pay{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;border-radius:16px}
.pay svg{width:18px;height:18px}
.note{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);
  text-align:center;margin-top:10px;line-height:1.5}

footer{border-top:1px solid var(--line);padding:26px 0 40px;margin-top:10px}
footer .row{display:flex;flex-direction:column;gap:6px}
footer .mono{font-size:11px;color:var(--muted);letter-spacing:.1em}

@media(prefers-reduced-motion:reduce){*{transition:none!important}}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  /* ── десктоп-навігація ── */
  .nav-links{display:none}
  .nav-links a{position:relative;font-size:15px;letter-spacing:.02em;color:var(--text);opacity:.72;
    transition:opacity .2s;display:flex;align-items:center;gap:8px}
  .nav-links a:hover{opacity:1}
  .nav-links .cart-count{font-size:11px}

  /* ── розмитий фон сторінки (з фото банера) ── */
  .page-bg{position:fixed;inset:0;z-index:-1;background:#050505}

  /* ── банер: широкий кроп + IG-бейдж ── */
  .banner{position:relative;aspect-ratio:5/4}
  .banner img{width:100%;height:100%;object-fit:cover;object-position:center 38%}
  .banner .ig{position:absolute;top:14px;right:16px;z-index:2;display:flex;align-items:center;gap:8px;
    font-family:'Archivo Expanded',sans-serif;font-weight:600;font-size:12px;letter-spacing:.08em;
    color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.55);transition:transform .2s}
  .banner .ig:hover{transform:scale(1.04)}
  .banner .ig svg{width:26px;height:26px;display:block;filter:drop-shadow(0 1px 4px rgba(0,0,0,.45))}

  /* ── десктоп-розкладка (як у референсі) ── */
  @media(min-width:861px){
    .bar{max-width:1180px}
    .wrap{max-width:1180px}
    .stack{max-width:660px;margin-left:auto;margin-right:auto}
    .nav-links{display:flex;gap:30px;align-items:center}
    .cart-btn{display:none}
    .logo{font-size:20px}
    .banner{aspect-ratio:10/3}
    .hero{padding:8px 0 18px}
  }

  /* ── HERO СТОРІС-КАРУСЕЛЬ (повноекранна, у стилі satisfy) ── */
  .hero-carousel{position:relative;width:100vw;margin-left:calc(50% - 50vw);
    height:80svh;overflow:hidden;background:#000;touch-action:pan-y;user-select:none}
  .hc-track{position:absolute;inset:0}
  .hc-slide{position:absolute;inset:0;opacity:0;transition:opacity .8s ease;pointer-events:none}
  .hc-slide.on{opacity:1;pointer-events:auto}
  .hc-media{width:100%;height:100%;object-fit:cover;display:block}
  .hc-slide .scrim{position:absolute;inset:0;pointer-events:none;background:
    linear-gradient(to top,rgba(0,0,0,.74),rgba(0,0,0,0) 44%),
    linear-gradient(to bottom,rgba(0,0,0,.5),rgba(0,0,0,0) 24%)}
  .hc-info{position:absolute;left:24px;right:24px;bottom:calc(46px + env(safe-area-inset-bottom,0px));z-index:3}
  .hc-eyebrow{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;
    text-transform:uppercase;color:#fff;opacity:.88}
  .hc-title{font-family:'Unbounded',sans-serif;font-weight:300;
    font-size:clamp(28px,8.5vw,44px);line-height:1.0;text-transform:uppercase;color:#fff;margin:10px 0 20px}
  .hc-cta{display:inline-flex;align-items:center;gap:10px;background:#fff;color:#000;
    font-family:'Archivo Expanded',sans-serif;font-weight:600;font-size:12px;letter-spacing:.16em;
    text-transform:uppercase;padding:15px 26px;border-radius:99px;transition:transform .18s}
  .hc-cta:active{transform:scale(.95)}
  .hc-cta .o{font-size:14px;margin-top:-1px}
  .hc-bars{position:absolute;left:0;right:0;margin:0 auto;width:max-content;
    z-index:5;display:flex;gap:4px;justify-content:center;
    top:auto;bottom:calc(env(safe-area-inset-bottom,0px) + 14px)}
  .hc-bar{width:20px;flex:none;height:2px;border-radius:99px;background:rgba(255,255,255,.25);overflow:hidden;cursor:pointer}
  .hc-bar > i{display:block;height:100%;width:0;background:rgba(255,255,255,.9);border-radius:99px}
  @media(min-width:861px){
    .hero-carousel{height:80svh}
    .hc-bars{top:auto;bottom:22px}
    .hc-info{left:40px}
  }

  /* ── іконки в шапці ── */
  .hicons{display:flex;align-items:center;gap:14px}
  .icn-btn{position:relative;width:32px;height:32px;display:grid;place-items:center;color:#fff;transition:color .25s ease}
  .icn-btn svg{width:24px;height:24px;display:block}
  .bag .cart-count{position:absolute;top:-3px;right:-6px;min-width:16px;height:16px;font-size:10px;
    padding:0 4px;background:var(--accent);color:#fff;border:none}
  .bag .cart-count.empty{display:none}

  /* ── меню-панель ── */
  .menu-panel{position:fixed;inset:0;z-index:70;background:rgba(5,5,5,.97);backdrop-filter:blur(8px);
    opacity:0;visibility:hidden;transition:opacity .3s;display:flex;flex-direction:column;justify-content:center;padding:0 30px}
  .menu-panel.open{opacity:1;visibility:visible}
  .menu-panel .dx{position:absolute;top:18px;right:18px;width:34px;height:34px;border-radius:99px;
    background:transparent;border:1px solid var(--line-2);display:grid;place-items:center;font-size:18px;color:#fff}
  .menu-nav{display:flex;flex-direction:column}
  .menu-nav a{font-family:'Unbounded',sans-serif;font-weight:300;font-size:clamp(28px,8vw,38px);
    letter-spacing:.01em;text-transform:uppercase;color:#fff;padding:14px 0;border-bottom:1px solid var(--line);transition:color .2s}
  .menu-nav a:active{color:var(--accent)}

  /* ── тимчасово приховано все, що нижче банера ── */
  .stack{display:none}
  #footer{display:none}

  /* ════ БІЛА СТОРІНКА ПІСЛЯ БАНЕРА ════ */
  .sheet-white{position:relative;z-index:1;width:100vw;margin-left:calc(50% - 50vw);background:#fff;color:#0a0a0a}

  /* НОВИЙ ДРОП */
  .drop{padding:52px 0 6px}
  .drop-title{font-family:'Unbounded',sans-serif;font-weight:700;font-size:clamp(40px,13vw,72px);
    line-height:.92;letter-spacing:-.01em;text-transform:uppercase;color:#0a0a0a;padding:0 20px;margin:0 0 28px}
  .rail{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;padding:0 15vw 6px;scroll-padding:0 15vw}
  .rail::-webkit-scrollbar{display:none}
  .rail{scrollbar-width:none}
  .pcard{flex:0 0 70vw;max-width:320px;scroll-snap-align:center;cursor:pointer}
  .pcard .pimg{aspect-ratio:4/5;background:#f1efe9;border-radius:14px;overflow:hidden}
  .pcard .pimg img{width:100%;height:100%;object-fit:cover;display:block}
  .pcard .pname{font-family:'Archivo Expanded',sans-serif;font-weight:600;font-size:13px;
    letter-spacing:.04em;text-transform:uppercase;color:#0a0a0a;margin-top:14px}
  .pcard .pcolor{font-size:13px;color:#9a948b;margin-top:4px}
  .pcard .pprice{font-family:'Space Mono',monospace;font-size:15px;color:#0a0a0a;margin-top:3px}

  .btn-dark{display:block;margin:30px auto 4px;background:#0a0a0a;color:#fff;border:none;cursor:pointer;
    font-family:'Archivo Expanded',sans-serif;font-weight:600;font-size:13px;letter-spacing:.18em;
    text-transform:uppercase;padding:17px 44px;border-radius:99px;transition:transform .18s}
  .btn-dark:active{transform:scale(.96)}

  /* ЛУКБУК-КАРУСЕЛЬ (3/5 висоти, з підгляданням сусідів) */
  .look{padding:36px 0 14px}
  .look-rail{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;
    padding:0 13vw;scroll-padding:0 13vw}
  .look-rail::-webkit-scrollbar{display:none}
  .look-rail{scrollbar-width:none}
  .lslide{flex:0 0 74vw;max-width:440px;height:60svh;scroll-snap-align:center;position:relative;
    border-radius:18px;overflow:hidden;background:#eee}
  .lslide img{width:100%;height:100%;object-fit:cover;display:block}
  .lslide .lscrim{position:absolute;inset:0;background:linear-gradient(rgba(0,0,0,.12),rgba(0,0,0,.5))}
  .lslide .lcap{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;text-align:center;padding:0 16px}
  .lslide .lname{font-family:'Unbounded',sans-serif;font-weight:300;font-size:clamp(18px,5.4vw,24px);
    text-transform:uppercase;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.4)}
  .lslide .lbuy{background:#fff;color:#000;border:none;cursor:pointer;font-family:'Archivo Expanded',sans-serif;
    font-weight:600;font-size:12px;letter-spacing:.16em;text-transform:uppercase;padding:13px 30px;border-radius:99px}

  /* ФУТЕР */
  .foot-white{background:#fff;color:#0a0a0a;padding:38px 20px calc(46px + env(safe-area-inset-bottom,0px));
    text-align:center;border-top:1px solid #ececec}
  .foot-cr{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;color:#8a8a8a;margin-bottom:20px}
  .foot-soc{display:flex;gap:24px;justify-content:center;align-items:center}
  .foot-soc a{color:#0a0a0a;width:28px;height:28px;display:grid;place-items:center;transition:opacity .2s}
  .foot-soc a:active{opacity:.5}
  .foot-soc svg{width:25px;height:25px;display:block}
</style>
</head>

  { id:"poster-most", kind:"Постер", name:"7 МОСТОВ · ПЛАКАТ", artist:"",
    price:350, total:150, left:96, sizes:[], images:[], payLink:"",
    desc:"Офсетний друк A1 на матовому папері 200г. Нумерований." },
];

/* ════════════════════════════════════════════════════════════════
   HERO — 5 банерів головної (товари + анонси).
   kind:"video" → відтворюється до кінця, далі наступний;
   kind:"prod"  → фото товару (imgIndex), автозміна ~5.6с;
   action:"shop" → кнопка веде в каталог; productId → відкриває картку.
   ════════════════════════════════════════════════════════════════ */
const HERO = [
  { kind:"video", src:"banner-hero.mp4", poster:"banner-hero-poster.jpg",
    eyebrow:"FROM KRBK · KYIV", title:"НОВИЙ ДРОП", cta:"До магазину", action:"shop" },
  { kind:"image", src:"banner-1.jpg", productId:"suit-total-resistance",
    eyebrow:"LIMITED COLLECTION · KRBK", title:"TOTAL RESISTANCE", cta:"Купити" },
  { kind:"image", src:"banner-2.jpg", productId:"shorts-krbk",
    eyebrow:"FROM KRBK", title:"KRBK SHORTS", cta:"Купити" },
  { kind:"image", src:"banner-3.jpg",
    eyebrow:"", title:"", cta:"До магазину", action:"shop" },
];
const HERO_DUR = 5600; // мс на фото-банер

/* ════════════════════════════════════════════════════════════════
   ③ ЛОГІКА
   ════════════════════════════════════════════════════════════════ */
const $ = s => document.querySelector(s);
const money = n => n.toLocaleString('uk-UA') + " " + CONFIG.currency;
const imagesOf = p => (p.images && p.images.length) ? p.images : (p.image ? [p.image] : []);
let cart = [];                                  // in-memory (на живому сайті — localStorage)
let activeProduct=null, activeSize=null;
let carousel={imgs:[],idx:0};

/* ── стопка карток ── */
function renderStack(){
  const s=$("#stack");
  s.innerHTML = PRODUCTS.map((p,i)=>{
    const imgs=imagesOf(p), sold=p.left<=0;
    let badge=`ТИРАЖ · ${p.total}`, cls="";
    if(sold){badge="Вичерпано";cls="out";}
    else if(p.left<=15){badge=`Лишилось ${p.left}`;cls="low";}
    const cover = imgs.length
      ? `<img src="${imgs[0]}" alt="${p.name}" loading="lazy">`
      : `<div class="ph"><span>фото · замінити</span></div>`;
    return `
    <article class="scard ${sold?'sold':''}" data-id="${p.id}" tabindex="0" role="button"
             style="z-index:${i+1}">
      <div class="bg">${cover}</div>
      <div class="grad"></div>
      <div class="top"><span class="badge ${cls}">${badge}</span></div>
      <div class="info">
        <div class="kind">${p.kind}</div>
        <div class="name">${p.name}</div>
        ${p.artist?`<div class="artist">${p.artist}</div>`:''}
        <div class="priceline">
          <span class="price">${money(p.price)}</span>
          <span class="cta">${sold?'Немає':'Дивитись'} <span class="o">→</span></span>
        </div>
      </div>
    </article>`;
  }).join("");
  s.querySelectorAll(".scard").forEach(c=>{
    const open=()=>openDetail(c.dataset.id);
    c.addEventListener("click",open);
    c.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();open();}});
  });
}

/* ── детальна картка + карусель ── */
function openDetail(id){
  const p=PRODUCTS.find(x=>x.id===id); if(!p) return;
  const sold=p.left<=0, imgs=imagesOf(p);
  activeProduct=p; activeSize=(p.sizes.length?null:"—");
  carousel={imgs, idx:0};

  const slides = (imgs.length?imgs:["__ph__"]).map(src=>
    src==="__ph__"
      ? `<div class="slide"><div class="ph"><span>фото · замінити</span></div></div>`
      : `<div class="slide"><img src="${src}" alt="${p.name}" draggable="false"></div>`
  ).join("");
  const dots = (imgs.length>1)
    ? `<div class="dots">${imgs.map((_,i)=>`<span class="dot ${i===0?'on':''}"></span>`).join("")}</div>` : "";
  const showNav = imgs.length>1 ? "" : "hide";

  $("#detail").innerHTML=`
    <div class="grip"></div>
    <button class="dx" id="closeDetail" aria-label="Закрити">×</button>
    <div class="carousel">
      <div class="track" id="track">${slides}</div>
      <button class="nav prev ${showNav}" id="cPrev" aria-label="Назад">‹</button>
      <button class="nav next ${showNav}" id="cNext" aria-label="Вперед">›</button>
      ${dots}
    </div>
    <div class="detail-body">
      <div class="kind">${p.kind}${p.artist?' · '+p.artist:''}</div>
      <h3>${p.name}</h3>
      <div class="edition">ТИРАЖ ${p.total} · ${sold?'вичерпано':'лишилось '+p.left}</div>
      <p class="desc">${p.desc}</p>
      ${p.sizes.length?`
        <div class="flabel">Розмір</div>
        <div class="sizes" id="sizes">${p.sizes.map(s=>`<button class="size" data-s="${s}">${s}</button>`).join("")}</div>`:''}
      <div class="detail-foot">
        <span class="price">${money(p.price)}</span>
        <button class="btn" id="addBtn" ${sold?'disabled':''}>${sold?'Немає в наявності':'У кошик'}</button>
      </div>
    </div>`;

  if(p.sizes.length){
    $("#sizes").querySelectorAll(".size").forEach(b=>b.addEventListener("click",()=>{
      $("#sizes").querySelectorAll(".size").forEach(x=>x.classList.remove("sel"));
      b.classList.add("sel"); activeSize=b.dataset.s; $("#sizes").classList.remove("warn");
    }));
  }
  $("#closeDetail").addEventListener("click",closeAll);
  if(!sold) $("#addBtn").addEventListener("click",addActive);
  setupCarousel();

  $("#scrim").classList.add("open");
  $("#detail").classList.add("open");
}

function setupCarousel(){
  const track=$("#track"); if(!track) return;
  const go=i=>{
    const n=carousel.imgs.length||1;
    carousel.idx=(i+n)%n;
    track.style.transform=`translateX(-${carousel.idx*100}%)`;
    const dots=$("#detail").querySelectorAll(".dot");
    dots.forEach((d,k)=>d.classList.toggle("on",k===carousel.idx));
  };
  const prev=$("#cPrev"), next=$("#cNext");
  if(prev) prev.addEventListener("click",()=>go(carousel.idx-1));
  if(next) next.addEventListener("click",()=>go(carousel.idx+1));
  // свайп
  let x0=null;
  track.addEventListener("pointerdown",e=>{x0=e.clientX;});
  track.addEventListener("pointerup",e=>{
    if(x0===null) return;
    const dx=e.clientX-x0; x0=null;
    if(Math.abs(dx)>40) go(carousel.idx+(dx<0?1:-1));
  });
}

function addActive(){
  const p=activeProduct;
  if(p.sizes.length && !activeSize){
    const sz=$("#sizes"); sz.classList.add("warn"); setTimeout(()=>sz.classList.remove("warn"),900); return;
  }
  const key=p.id+"|"+(activeSize||"—");
  const ex=cart.find(i=>i.key===key);
  if(ex) ex.qty++;
  else cart.push({key,id:p.id,name:p.name,size:activeSize,price:p.price,image:imagesOf(p)[0]||null,qty:1});
  syncCart(); closeAll(); openDrawer();
}

/* ── кошик ── */
function syncCart(){
  const count=cart.reduce((a,i)=>a+i.qty,0);
  document.querySelectorAll(".cart-count").forEach(cc=>{cc.textContent=count;cc.classList.toggle("empty",count===0);});
  renderItems();
}
function renderItems(){
  const box=$("#items"), foot=$("#drawerFoot");
  if(!cart.length){box.innerHTML=`<div class="empty-cart">Кошик порожній.<br>Обери щось із каталогу.</div>`;foot.style.display="none";return;}
  box.innerHTML=cart.map(i=>`
    <div class="line">
      <div class="li-img">${i.image?`<img src="${i.image}" alt="">`:`<div class="ph"></div>`}</div>
      <div class="li-info">
        <div class="li-name">${i.name}</div>
        <div class="li-sub">${i.size&&i.size!=="—"?'Розмір '+i.size+' · ':''}${money(i.price)}</div>
        <div class="li-bottom">
          <div class="qty">
            <button data-k="${i.key}" data-d="-1">−</button><span>${i.qty}</span><button data-k="${i.key}" data-d="1">+</button>
          </div>
          <span class="li-price">${money(i.price*i.qty)}</span>
        </div>
      </div>
    </div>`).join("");
  box.querySelectorAll(".qty button").forEach(b=>b.addEventListener("click",()=>changeQty(b.dataset.k,+b.dataset.d)));
  foot.style.display="block";
  $("#sum").textContent=money(cart.reduce((a,i)=>a+i.price*i.qty,0));
  $("#fields").classList.toggle("hidden",!CONFIG.delivery);
}
function changeQty(key,d){
  const i=cart.find(x=>x.key===key); if(!i) return;
  i.qty+=d; if(i.qty<=0) cart=cart.filter(x=>x.key!==key); syncCart();
}

/* ── оплата monobank ── */
async function checkout(){
  if(!cart.length) return;
  const total=cart.reduce((a,i)=>a+i.price*i.qty,0);
  let delivery=null;
  if(CONFIG.delivery){
    delivery={name:$("#f-name").value.trim(),phone:$("#f-phone").value.trim(),
      city:$("#f-city").value.trim(),branch:$("#f-np").value.trim()};
    if(!delivery.name||!delivery.phone||!delivery.city||!delivery.branch){
      flashNote("Заповни ім'я, телефон, місто і відділення."); return;}
  }
  if(!CONFIG.CHECKOUT_ENDPOINT){
    if(cart.length===1){const p=PRODUCTS.find(x=>x.id===cart[0].id);
      if(p&&p.payLink){location.href=p.payLink;return;}}
    flashNote("DEMO: підключи monobank (CHECKOUT_ENDPOINT або payLink). Замовлення на "+money(total)+".");
    console.log("ЗАМОВЛЕННЯ →",{cart,total,delivery}); return;
  }
  flashNote("Створюю рахунок…");
  try{
    const res=await fetch(CONFIG.CHECKOUT_ENDPOINT,{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({amount:total*100,
        items:cart.map(i=>({name:i.name+(i.size&&i.size!=="—"?` (${i.size})`:""),qty:i.qty,sum:i.price*100})),
        delivery})});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data=await res.json();
    if(data.pageUrl) location.href=data.pageUrl; else throw new Error("no pageUrl");
  }catch(err){flashNote("Не вдалося створити рахунок. Спробуй ще раз.");console.error(err);}
}
function flashNote(t){$("#payNote").textContent=t;}

function openDrawer(){$("#scrim").classList.add("open");$("#drawer").classList.add("open");flashNote("");}
function closeAll(){["#scrim","#detail","#drawer"].forEach(s=>$(s).classList.remove("open"));}
$("#cartBtn").addEventListener("click",openDrawer);
function openMenu(){$("#menuPanel").classList.add("open");}
function closeMenu(){$("#menuPanel").classList.remove("open");}
$("#menuBtn").addEventListener("click",openMenu);
$("#menuClose").addEventListener("click",closeMenu);
$("#menuPanel").addEventListener("click",e=>{if(e.target===$("#menuPanel"))closeMenu();});
$(".m-home").addEventListener("click",e=>{e.preventDefault();closeMenu();window.scrollTo({top:0,behavior:"smooth"});});
$(".m-pay").addEventListener("click",e=>{e.preventDefault();closeMenu();});
$("#closeDrawer").addEventListener("click",closeAll);
$("#scrim").addEventListener("click",closeAll);
$("#checkoutBtn").addEventListener("click",checkout);
document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeAll();closeMenu();}});

/* ── шапка ховається при скролі вниз, з'являється при скролі вгору ── */
(function(){
  const h=document.querySelector("header");let lastY=window.scrollY||0;
  const solidAt=()=>{const hc=document.querySelector(".hero-carousel");return (hc?hc.offsetHeight:window.innerHeight)-h.offsetHeight-2;};
  function onScroll(){
    const y=window.scrollY||0;
    h.classList.toggle("solid", y>solidAt());
    if(Math.abs(y-lastY)>=5){
      if(y>lastY && y>70) h.classList.add("hide"); else h.classList.remove("hide");
      lastY=y;
    }
  }
  window.addEventListener("scroll",onScroll,{passive:true});
  onScroll();
})();

/* ── HERO сторіс-карусель ── */
let hc={i:0,n:HERO.length,timer:null,vid:null};
function imgFor(s){const pr=PRODUCTS.find(x=>x.id===s.productId);const arr=pr?imagesOf(pr):[];return arr[s.imgIndex||0]||arr[0]||"";}
function buildHero(){
  const track=$("#hcTrack"),bars=$("#hcBars");
  track.innerHTML=HERO.map((s,i)=>{
    const media=s.kind==="video"
      ? `<video class="hc-media" src="${s.src}" poster="${s.poster||''}" muted loop playsinline preload="metadata"></video>`
      : `<img class="hc-media" src="${s.src||imgFor(s)}" alt="${s.title||''}">`;
    return `<div class="hc-slide" data-i="${i}">${media}<div class="scrim"></div>
      <div class="hc-info">${s.eyebrow?`<div class="hc-eyebrow">${s.eyebrow}</div>`:''}
      ${s.title?`<div class="hc-title">${s.title}</div>`:''}
      <button class="hc-cta" data-i="${i}">${s.cta||'Дивитись'} <span class="o">→</span></button></div></div>`;
  }).join("");
  bars.innerHTML=HERO.map((_,i)=>`<div class="hc-bar" data-i="${i}"><i></i></div>`).join("");
  track.querySelectorAll(".hc-cta").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();heroCta(HERO[+b.dataset.i]);}));
  bars.querySelectorAll(".hc-bar").forEach(b=>b.addEventListener("click",()=>hcShow(+b.dataset.i)));
  const car=$("#heroCar");let x0=null;
  car.addEventListener("pointerdown",e=>{x0=e.clientX;});
  car.addEventListener("pointerup",e=>{if(x0==null)return;const dx=e.clientX-x0;x0=null;if(Math.abs(dx)>45)hcShow(hc.i+(dx<0?1:-1));});
  hcShow(0);
}
function heroCta(s){
  if(s.action==="shop"){const st=document.getElementById("stack");if(st)st.scrollIntoView({behavior:"smooth"});}
  else if(s.productId){openDetail(s.productId);}
}
function hcClear(){if(hc.timer){clearTimeout(hc.timer);hc.timer=null;}if(hc.vid){hc.vid.onended=null;hc.vid.ontimeupdate=null;try{hc.vid.pause();}catch(e){}hc.vid=null;}}
function hcShow(idx){
  const n=hc.n;idx=((idx%n)+n)%n;hc.i=idx;hcClear();
  const slides=$("#hcTrack").querySelectorAll(".hc-slide");
  slides.forEach((sl,k)=>sl.classList.toggle("on",k===idx));
  const bars=$("#hcBars").querySelectorAll(".hc-bar");
  bars.forEach((bar,k)=>{const f=bar.querySelector("i");f.style.transition="none";f.style.width=(k<idx?"100%":"0%");});
  const conf=HERO[idx],fill=bars[idx].querySelector("i");
  if(conf.kind==="video"){
    const v=slides[idx].querySelector("video");hc.vid=v;
    try{v.currentTime=0;}catch(e){}
    const play=v.play();if(play&&play.catch)play.catch(()=>{});
    v.ontimeupdate=()=>{if(v.duration)fill.style.width=(v.currentTime/v.duration*100)+"%";};
    v.onended=()=>hcShow(idx+1);
    v.onerror=()=>hcShow(idx+1);
    hc.timer=setTimeout(()=>{if(!v.currentTime)hcShow(idx+1);},7000);
  }else{
    requestAnimationFrame(()=>{fill.style.transition="width "+HERO_DUR+"ms linear";fill.style.width="100%";});
    hc.timer=setTimeout(()=>hcShow(idx+1),HERO_DUR);
  }
}
document.addEventListener("visibilitychange",()=>{if(document.hidden)hcClear();else hcShow(hc.i);});

/* ── НОВИЙ ДРОП (горизонтальний рейл товарів) ── */
function buildDrop(){
  const rail=$("#dropRail");
  rail.innerHTML=PRODUCTS.filter(p=>p.drop).map(p=>{
    const img=imagesOf(p)[0]||"";
    return `<article class="pcard" data-id="${p.id}">
      <div class="pimg">${img?`<img src="${img}" alt="${p.name}">`:''}</div>
      <div class="pname">${p.name}</div>
      <div class="pcolor">${p.color||''}</div>
      <div class="pprice">${money(p.price)}</div>
    </article>`;
  }).join("");
  rail.querySelectorAll(".pcard").forEach(c=>c.addEventListener("click",()=>openDetail(c.dataset.id)));
}
/* ── лукбук ── */
const LOOK=[
  {productId:"suit-total-resistance",imgIndex:0,name:"TOTAL RESISTANCE"},
  {productId:"hoodie-krbk",imgIndex:0,name:"FROM KRBK HOODIE"},
  {productId:"shorts-krbk",imgIndex:0,name:"KRBK SHORTS"},
];
function buildLook(){
  const rail=$("#lookRail");
  rail.innerHTML=LOOK.map(s=>{
    const p=PRODUCTS.find(x=>x.id===s.productId);const img=p?(imagesOf(p)[s.imgIndex||0]||imagesOf(p)[0]||""):"";
    return `<div class="lslide" data-id="${s.productId}"><img src="${img}" alt="${s.name}">
      <div class="lscrim"></div><div class="lcap"><div class="lname">${s.name}</div>
      <button class="lbuy" data-id="${s.productId}">Купити</button></div></div>`;
  }).join("");
  rail.querySelectorAll(".lbuy").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();openDetail(b.dataset.id);}));
}
const _seeAll=$("#seeAll");if(_seeAll)_seeAll.addEventListener("click",()=>{$("#lookRail").scrollIntoView({behavior:"smooth"});});

renderStack(); syncCart(); buildHero(); buildDrop(); buildLook();
</script>
</body>
</html>
